  if(m)m.remove();
}

// Global project form state
var _apjState = {
  name:'', desc:'', cur:'USD', tz:'UTC+2', sync:'15',
  revGoal:'50000', budget:'10000', tROAS:'3.0', tCPA:'25',
  fbConnected:false
};

function apjSaveCurrentStep(){
  // Save all known fields if present in DOM
  var fields = {
    'apj-name':'name','apj-desc':'desc','apj-cur':'cur','apj-tz':'tz',
    'apj-sync':'sync','apj-rev-goal':'revGoal','apj-budget':'budget',
    'apj-troas':'tROAS','apj-tcpa':'tCPA'
  };
  Object.keys(fields).forEach(function(id){
    var el=document.getElementById(id);
    if(el) _apjState[fields[id]]=el.value;
  });
}

function apjRestoreStep(n){
  // Restore saved values into current step's fields
  var fields = {
    'apj-name':'name','apj-desc':'desc','apj-cur':'cur','apj-tz':'tz',
    'apj-sync':'sync','apj-rev-goal':'revGoal','apj-budget':'budget',
    'apj-troas':'tROAS','apj-tcpa':'tCPA'
  };
  Object.keys(fields).forEach(function(id){
    var el=document.getElementById(id);
    if(el && _apjState[fields[id]]) el.value=_apjState[fields[id]];
  });
}

function addProjStep(n){
  var el=document.getElementById('add-proj-modal');
  if(!el)return;
  // Save current fields before switching
  apjSaveCurrentStep();
  el._step=n;
  var content=document.getElementById('apj-content');
  if(content) content.innerHTML=buildAddProjectStep(n);
  // Restore saved values in new step
  apjRestoreStep(n);
  // Update step indicators
  for(var i=1;i<=4;i++){
    var dot=document.getElementById('apj-step-'+i);
    if(!dot)continue;
    if(i<n){dot.style.background='var(--green)';dot.style.borderColor='var(--green)';}
    else if(i===n){dot.style.background='var(--accent)';dot.style.borderColor='var(--accent)';}
    else{dot.style.background='transparent';dot.style.borderColor='var(--border2)';}
    var lbl=document.getElementById('apj-steplbl-'+i);
    if(lbl)lbl.style.color=i===n?'var(--text)':'var(--text4)';
  }
}

function buildAddProjectHTML(step){
  var bc=L().businessControl||{};
  var ph=L().projectsHub||{};
  var steps=[
    bc.connectMeta||bc.general||'Connect Meta',
    bc.projectSetup||'Project Setup',
    bc.monthlyGoals||'Monthly Plan',
    'Data Sources'
  ];
  var stepBar='<div style="display:flex;align-items:center;gap:0;margin-bottom:24px">';
  for(var i=0;i<steps.length;i++){
    var n=i+1;
    var active=n===step, done=n<step;
    var dotBg=done?'var(--green)':active?'var(--accent)':'transparent';
    var dotBorder=done?'var(--green)':active?'var(--accent)':'var(--border2)';
    var lblColor=active?'var(--text)':'var(--text4)';
    stepBar+='<div style="display:flex;flex-direction:column;align-items:center;flex:1">';
    stepBar+='<div id="apj-step-'+n+'" style="width:26px;height:26px;border-radius:50%;border:2px solid '+dotBorder+';background:'+dotBg+';display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:#fff;transition:all .3s">'+(done?'\u2713':n)+'</div>';
    stepBar+='<div id="apj-steplbl-'+n+'" style="font-size:9px;margin-top:4px;color:'+lblColor+';text-align:center;white-space:nowrap">'+steps[i]+'</div>';
    stepBar+='</div>';
    if(i<steps.length-1) stepBar+='<div style="flex:1;height:1px;background:var(--border);margin-bottom:16px"></div>';
  }
  stepBar+='</div>';

  return '<div style="background:var(--bg3);border:1px solid var(--border2);border-radius:16px;width:100%;max-width:560px;max-height:92vh;overflow-y:auto;-webkit-overflow-scrolling:touch">'+
    '<div style="padding:18px 22px 14px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;background:var(--bg3);z-index:2;border-radius:16px 16px 0 0">'+
      '<div>'+
        '<div style="font-size:15px;font-weight:700;color:var(--text)">'+(bc.addNewProject||ph.createProject||'Create New Project')+'</div>'+
        '<div style="font-size:11px;color:var(--text4);margin-top:2px">E-commerce workspace setup</div>'+
      '</div>'+
      '<button onclick="closeAddProjectModal()" style="background:var(--hover-bg);border:1px solid var(--border2);color:var(--text3);cursor:pointer;border-radius:8px;width:32px;height:32px;font-size:16px">\u2715</button>'+
    '</div>'+
    '<div style="padding:20px 22px">'+
      stepBar+
      '<div id="apj-content">'+buildAddProjectStep(step)+'</div>'+
    '</div>'+
  '</div>';
}

function buildAddProjectStep(n){
  var bc=L().businessControl||{};var ph=L().projectsHub||{};
  var h='';
  function field(id,label,type,ph,val,hint){
    return '<div style="margin-bottom:14px">'+
      '<label style="display:block;font-size:10px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.05em;margin-bottom:5px">'+label+'</label>'+
      '<input id="'+id+'" type="'+type+'" placeholder="'+ph+'" value="'+(val||'')+'" style="width:100%;padding:8px 11px;border-radius:8px;background:var(--inp-bg);border:1px solid var(--border2);color:var(--text);font-size:12px;box-sizing:border-box">'+
      (hint?'<div style="font-size:10px;color:var(--text4);margin-top:4px">'+hint+'</div>':'')+
    '</div>';
  }
  function select(id,label,opts,hint){
    return '<div style="margin-bottom:14px">'+
      '<label style="display:block;font-size:10px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.05em;margin-bottom:5px">'+label+'</label>'+
      '<select id="'+id+'" style="width:100%;padding:8px 11px;border-radius:8px;background:var(--inp-bg);border:1px solid var(--border2);color:var(--text);font-size:12px;box-sizing:border-box">'+
        opts.map(function(o){return '<option value="'+o.v+'">'+o.l+'</option>';}).join('')+
      '</select>'+
      (hint?'<div style="font-size:10px;color:var(--text4);margin-top:4px">'+hint+'</div>':'')+
    '</div>';
  }
  function sec(title){
    return '<div style="font-size:10px;font-weight:700;color:var(--accent-txt);text-transform:uppercase;letter-spacing:.07em;padding:5px 10px;background:var(--accent-bg);border-left:3px solid var(--accent);border-radius:0 6px 6px 0;margin-bottom:14px">'+title+'</div>';
  }

  if(n===1){
    // Step 1: Connect Meta
    h+=sec(bc.fbConnection||'');
    h+='<div style="padding:16px;background:var(--bg2);border:1px solid var(--border);border-radius:10px;margin-bottom:16px;text-align:center">';
    h+='<div style="font-size:13px;font-weight:600;color:var(--text);margin-bottom:6px">'+(bc.connectVia||'')+'</div>';
    h+='<div style="font-size:11px;color:var(--text4);margin-bottom:14px">'+(bc.connectViaHint||'')+'</div>';
    h+='<button id="apj-fb-btn" onclick="apjSimulateConnect()" style="padding:9px 24px;border-radius:9px;background:#1877F2;border:none;color:#fff;font-size:12px;font-weight:600;cursor:pointer;display:inline-flex;align-items:center;gap:8px">'+
      '<svg width="16" height="16" viewBox="0 0 24 24" fill="#fff"><path d="M24 12.07C24 5.41 18.63 0 12 0S0 5.4 0 12.07C0 18.1 4.39 23.1 10.13 24v-8.44H7.08v-3.49h3.04V9.41c0-3.02 1.8-4.7 4.54-4.7 1.31 0 2.68.24 2.68.24v2.97h-1.5c-1.5 0-1.96.93-1.96 1.89v2.26h3.32l-.53 3.5h-2.8V24C19.62 23.1 24 18.1 24 12.07z"/></svg>'+
      (bc.connectFB||'')+'</button>';
    h+='</div>';
    h+='<div id="apj-bm-section" style="display:none">';
    h+=sec(bc.bmAccounts||'');
    h+='<div id="apj-bm-list" style="display:flex;flex-direction:column;gap:8px;margin-bottom:14px"></div>';
    h+='</div>';
    h+=nav_buttons(n);

  } else if(n===2){
    // Step 2: Project Info
    h+=sec(bc.projectInfo||'');
    h+=field('apj-name',(bc.projectName||''),'text',(bc.projectNamePh||''),'',(bc.projectNameHint||''));
    h+='<div style="margin-bottom:14px"><label style="display:block;font-size:10px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.05em;margin-bottom:5px">'+(bc.description||'')+'</label>'+
      '<textarea id="apj-desc" placeholder="'+(bc.descriptionPh||'')+'" style="width:100%;padding:8px 11px;border-radius:8px;background:var(--inp-bg);border:1px solid var(--border2);color:var(--text);font-size:12px;box-sizing:border-box;height:64px;resize:vertical"></textarea></div>';
    h+=sec(bc.currencyTimezone||'');
    h+=select('apj-cur',(bc.currency||''),[
      {v:'USD',l:'USD \u2014 US Dollar'},{v:'EUR',l:'EUR \u2014 Euro'},{v:'UAH',l:'UAH \u2014 Ukrainian Hryvnia'}
    ],'');
    h+=select('apj-tz',(bc.timezone||''),[
      {v:'UTC+0',l:'UTC+0 \u2014 London'},{v:'UTC+1',l:'UTC+1 \u2014 Paris, Warsaw'},
      {v:'UTC+2',l:'UTC+2 \u2014 Kyiv, Bucharest'},{v:'UTC+3',l:'UTC+3 \u2014 Moscow, Istanbul'},
      {v:'UTC-5',l:'UTC-5 \u2014 New York'},{v:'UTC-8',l:'UTC-8 \u2014 Los Angeles'}
    ],'');
    h+=select('apj-sync',(bc.syncInterval||''),[
      {v:'5',l: bc.syncEvery5||'Every 5 min'},{v:'15',l:bc.syncEvery15||'Every 15 min'},
      {v:'30',l: bc.syncEvery30||'Every 30 min'},{v:'60',l:bc.syncEvery60||'Every 1 hour'},{v:'Manual',l:bc.syncManual||'Manual'}
    ],(bc.syncIntervalHint||''));
    h+=nav_buttons(n);

  } else if(n===3){
    // Step 3: Monthly Plan — must match Settings exactly (V1 brief)
    h+=sec((bc.monthlyGoals||''));
    h+='<div style="font-size:11px;color:var(--text4);margin-bottom:14px">'+(bc.monthlyGoalsHint||'')+'</div>';
    h+='<div style="display:grid;grid-template-columns:1fr 1fr;gap:12px">';
    h+=field('apj-rev-goal',(bc.revenueGoal||''),'number','50000','',(bc.revenueGoalHint||''));
    h+=field('apj-budget', (bc.adBudget||''),'number','10000','',(bc.budgetHint||''));
    h+=field('apj-troas',  (bc.targetROAS||''),'number','3.0','',(bc.targetROASHint||''));
    h+=field('apj-tcpa',   (bc.targetCPA||''),'number','25','',(bc.targetCPAHint||''));
    h+='</div>';
    h+=nav_buttons(n);

  } else if(n===4){
    // Step 4: Data Sources — V1 scope: only Shopify + Google Sheets (per brief)
    h+=sec(bc.connectSalesSources||'');
    h+='<div style="font-size:11px;color:var(--text4);margin-bottom:14px">'+(bc.connectSalesSourcesHint||'')+'</div>';
    var lng=L();
    var isUk = ST.lang==='uk';
    var sources=[
      {id:'shopify', icon:'S', color:'#96bf48', label:'Shopify',
       desc: isUk ? '\u0417\u0430\u043C\u043E\u0432\u043B\u0435\u043D\u043D\u044F \u0442\u0430 \u0434\u043E\u0445\u0456\u0434 \u0437 \u0432\u0430\u0448\u043E\u0433\u043E Shopify-\u043C\u0430\u0433\u0430\u0437\u0438\u043D\u0443' : 'Orders and revenue from your Shopify store'},
      {id:'gsheets', icon:'G', color:'#34a853', label:'Google Sheets',
       desc: isUk ? '\u041F\u0440\u043E\u0434\u0430\u0436\u0456 \u0437 Google \u0422\u0430\u0431\u043B\u0438\u0446\u0456' : 'Sales data from a spreadsheet'}
    ];
    h+='<div style="display:flex;flex-direction:column;gap:8px;margin-bottom:14px">';
    sources.forEach(function(src){
      h+='<div style="display:flex;align-items:center;gap:12px;padding:11px 14px;background:var(--bg2);border:1px solid var(--border);border-radius:9px">';
      h+='<div style="width:32px;height:32px;border-radius:7px;background:'+src.color+'22;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;color:'+src.color+';flex-shrink:0">'+src.icon+'</div>';
      h+='<div style="flex:1"><div style="font-size:12px;font-weight:600;color:var(--text)">'+src.label+'</div>'+
        '<div style="font-size:10px;color:var(--text4)">'+src.desc+'</div></div>';
      h+='<label style="display:flex;align-items:center;cursor:pointer">';
      h+='<input type="checkbox" id="apj-src-'+src.id+'" style="width:16px;height:16px;cursor:pointer;accent-color:var(--accent)">';
      h+='</label>';
      h+='</div>';
    });
    h+='</div>';
    // Final create button
    h+='<div style="display:flex;gap:10px;justify-content:flex-end;padding-top:4px">';
    h+='<button onclick="closeAddProjectModal()" style="padding:9px 22px;border-radius:9px;border:1px solid var(--border2);background:transparent;color:var(--text2);font-size:12px;font-weight:500;cursor:pointer">'+(bc.cancelBtn||ph.cancel||'')+'</button>';
    h+='<button id="apj-create-btn" onclick="apjCreateProject(this)" style="padding:9px 22px;border-radius:9px;background:var(--accent);border:none;color:#fff;font-size:13px;font-weight:700;cursor:pointer">'+(bc.createProject||ph.create||'')+'</button>';
    h+='</div>';
  }
  return h;
}

function nav_buttons(step){
  var h='<div style="display:flex;justify-content:space-between;margin-top:20px;padding-top:16px;border-top:1px solid var(--border)">';
  if(step>1){
    h+='<button onclick="addProjStep('+(step-1)+')" style="padding:9px 20px;border-radius:9px;border:1px solid var(--border2);background:transparent;color:var(--text2);font-size:12px;font-weight:500;cursor:pointer">\u2190 Back</button>';
  } else {
    h+='<div></div>';
  }
  h+='<button onclick="addProjStep('+(step+1)+')" style="padding:9px 22px;border-radius:9px;background:var(--accent);border:none;color:#fff;font-size:12px;font-weight:600;cursor:pointer">Continue \u2192</button>';
  h+='</div>';
  return h;
}

// Simulate Facebook connect
function apjSimulateConnect(){
  var btn=document.getElementById('apj-fb-btn');
  if(btn){btn.innerHTML='\u23F3 Connecting...';btn.disabled=true;}
  setTimeout(function(){
    if(btn){btn.innerHTML='\u2713 Connected';btn.style.background='#10b981';btn.disabled=true;}
    var sec=document.getElementById('apj-bm-section');
    if(sec){
      sec.style.display='block';
      var list=document.getElementById('apj-bm-list');
      if(list){
        var bms=[
          {id:'bm1',name:'Primary Business Manager',accounts:['Main Purchase Account','Retargeting Account']},
          {id:'bm2',name:'Secondary BM',accounts:['Test Account']}
        ];
        list.innerHTML=bms.map(function(bm){
          return '<div style="border:1px solid var(--border);border-radius:9px;overflow:hidden">'+
            '<div style="padding:9px 12px;background:var(--bg2);border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px">'+
              '<input type="checkbox" id="apj-bm-'+bm.id+'" checked style="accent-color:var(--accent)">'+
              '<span style="font-size:12px;font-weight:600;color:var(--text)">'+bm.name+'</span>'+
            '</div>'+
            bm.accounts.map(function(acc){
              return '<div style="padding:7px 12px 7px 32px;display:flex;align-items:center;gap:8px;border-bottom:1px solid var(--border)">'+
                '<input type="checkbox" checked style="accent-color:var(--accent)">'+
                '<span style="font-size:11px;color:var(--text2)">'+acc+'</span>'+
              '</div>';
            }).join('')+
          '</div>';
        }).join('');
      }
    }
  },1500);
}

// Create project (demo)
function apjCreateProject(btn){
  // Prevent double-click
  if(btn){
    if(btn.dataset.busy==='1') return;
    btn.dataset.busy='1';
    btn.disabled=true;
    btn.style.opacity='.7';
    btn.style.cursor='wait';
  }
  // Save current step first
  apjSaveCurrentStep();
  var name = (_apjState.name||'').trim();
  var desc = (_apjState.desc||'').trim();
  var bc=L().businessControl||{};

  // Validation: name and description required
  if(!name){
    if(btn){ btn.dataset.busy=''; btn.disabled=false; btn.style.opacity=''; btn.style.cursor=''; }
    apjShowError(bc.errProjectName||'');
    addProjStep(2);
    setTimeout(function(){
      var el=document.getElementById('apj-name');
      if(el){el.style.borderColor='var(--red)';el.focus();}
    },100);
    return;
  }
  if(!desc){
    if(btn){ btn.dataset.busy=''; btn.disabled=false; btn.style.opacity=''; btn.style.cursor=''; }
    apjShowError(bc.errProjectDesc||'');
    addProjStep(2);
    setTimeout(function(){
      var el=document.getElementById('apj-desc');
      if(el){el.style.borderColor='var(--red)';el.focus();}
    },100);
    return;
  }

  // Save any remaining step fields then read from state
  apjSaveCurrentStep();
  var cur    = _apjState.cur||'USD';
  var tz     = _apjState.tz||'UTC+2';
  var sync   = _apjState.sync||'15';
  var revGoal= _apjState.revGoal||'50000';
  var budget = _apjState.budget||'10000';
  var tROAS  = _apjState.tROAS||'3.0';
  var tCPA   = _apjState.tCPA||'25';

  // Generate unique project id
  var pid = 'proj_' + Date.now();

  var base = {
    id:   pid,
    name: name,
    desc: desc,
    type: 'Meta Ads',
    cur:  cur,
    tz:   tz,
    bms:  []
  };
  base.settings = {
    syncInterval: sync,
    revenueGoal:  revGoal,
    adBudget:     budget,
    targetROAS:   tROAS,
    targetCPA:    tCPA
  };

  // Connected sales sources (V1 scope: Shopify + Google Sheets only)
  var sources = [];
  ['shopify','gsheets'].forEach(function(s){
    var el = document.getElementById('apj-src-'+s);
    if(el && el.checked) sources.push(s);
  });
  base.sources = sources;

  // Add to global projects
  P[pid] = base;
  ST.pid = pid;
  _ordersCache = {};

  closeAddProjectModal();

  // Success toast
  var toast = document.createElement('div');
  toast.style.cssText = 'position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#10b981;color:#fff;padding:12px 24px;border-radius:10px;font-size:13px;font-weight:600;z-index:900;box-shadow:0 4px 20px rgba(0,0,0,.3);white-space:nowrap';
  var ok = bc.projectCreatedOk || "";
  toast.innerHTML = '\u2713 ' + ok.replace('{name}', name);
  document.body.appendChild(toast);
  setTimeout(function(){toast.remove();}, 3500);

  // Refresh Hub if open
  if(APP_STATE && APP_STATE.view==='hub' && typeof renderProjectsHub==='function'){
    renderProjectsHub();
  }
  // Launch into the new project via APP_STATE
  APP_STATE.view="platform"; APP_STATE.activeProject=pid;
  renderAppView();
}

function apjShowError(msg){
  var existing = document.getElementById('apj-error');
  if(existing) existing.remove();
  var err = document.createElement('div');
  err.id = 'apj-error';
  err.style.cssText = 'position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--red);color:#fff;padding:11px 22px;border-radius:10px;font-size:12px;font-weight:600;z-index:1000;box-shadow:0 4px 20px rgba(0,0,0,.3)';
  err.innerHTML = '\u26A0 ' + msg;
  document.body.appendChild(err);
  setTimeout(function(){err.remove();}, 3000);
}

function openAccountCenter(){
  var el = document.getElementById('account-center');
  if(!el){ el=document.createElement('div'); el.id='account-center'; document.body.appendChild(el); }
  renderAccountCenter();
  el.classList.add('open');
  document.body.classList.add('drawer-open');
}

function closeAccountCenter(){
  var el=document.getElementById('account-center');
  if(el){ el.classList.remove('open'); document.body.classList.remove('drawer-open'); }
}

function switchAccountTab(tab){
  ST.accountTab=tab;
  var body=document.getElementById('ac-body');
  if(body) body.innerHTML=renderAccountTabContent(tab);
  document.querySelectorAll('.ac-tab').forEach(function(btn){
    var active=btn.getAttribute('data-tab')===tab;
    btn.style.background=active?'var(--accent-bg)':'transparent';
    btn.style.color=active?'var(--accent-txt)':'var(--text3)';
    btn.style.borderColor=active?'var(--accent-brd)':'transparent';
  });
}

function renderAccountCenter(){
  var el=document.getElementById('account-center');
  if(!el)return;
  var lng=L(); var ac=lng.accountCenter||{};
  // V1 scope: Profile / Billing / Support / Logout (per final brief).
  // Access center and Privacy center removed.
  var tabs=[
    {id:'settings', label:ac.tabSettings ||''},
    {id:'billing',  label:ac.tabBilling  ||''},
    {id:'support',  label:ac.tabSupport  ||''},
    {id:'logout',   label:ac.tabLogout   ||''}
  ];
  // Defensive: if old session had access/privacy selected, fall back to settings
  if(ST.accountTab==='access'||ST.accountTab==='privacy') ST.accountTab='settings';
  var cur=ST.accountTab||'settings';
  var h='';
  // Header
  h+='<div class="account-center-header" style="position:sticky;top:0;z-index:2;background:var(--bg3);border-bottom:1px solid var(--border);padding:16px 20px 0">';
  h+='<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px">';
  h+='<div>';
  h+='<div style="font-size:15px;font-weight:700;color:var(--text)">'+ac.title+'</div>';
  h+='<div style="font-size:11px;color:var(--text4);margin-top:2px">'+ac.subtitle+'</div>';
  h+='</div>';
  h+='<button onclick="closeAccountCenter()" style="background:var(--hover-bg);border:1px solid var(--border2);color:var(--text3);cursor:pointer;border-radius:8px;width:32px;height:32px;font-size:16px;display:flex;align-items:center;justify-content:center;flex-shrink:0">\u2715</button>';
  h+='</div>';
  // User card

  h+='<div style="min-width:0;flex:1">';

  h+='<div style="font-size:10px;color:var(--text4)">'+ac.userEmail+'</div>';
  h+='</div>';
  h+='<span style="font-size:9px;font-weight:700;padding:2px 8px;border-radius:5px;background:rgba(16,185,129,.1);color:#10b981;letter-spacing:.04em">'+ac.active+'</span>';

  h+='<div style="display:flex;gap:2px;overflow-x:auto;padding-bottom:0;-webkit-overflow-scrolling:touch;scrollbar-width:none">';
  tabs.forEach(function(t){
    var active=t.id===cur;
    h+='<button class="ac-tab" data-tab="'+t.id+'" onclick="switchAccountTab(\''+t.id+'\')" style="padding:7px 12px;border-radius:7px 7px 0 0;border:1px solid '+(active?'var(--accent-brd)':'transparent')+';background:'+(active?'var(--accent-bg)':'transparent')+';color:'+(active?'var(--accent-txt)':'var(--text3)')+';font-size:11px;font-weight:600;cursor:pointer;white-space:nowrap;flex-shrink:0;transition:all .15s">'+t.label+'</button>';
  });
  h+='</div>';
  h+='</div>';
  // Body
  h+='<div id="ac-body" style="padding:18px 20px;overflow-y:auto">'+renderAccountTabContent(cur)+'</div>';
  el.innerHTML=h;
}

function renderAccountTabContent(tab){
  if(tab==='settings') return renderAccountSettingsTab();
  if(tab==='billing')  return renderAccountBillingTab();
  if(tab==='support')  return renderAccountSupportTab();
  if(tab==='logout')   return renderAccountLogoutTab();
  // access / privacy tabs removed in V1 scope cleanup
  return '';
}

// \u2500\u2500 Helper: card wrapper \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500
function acCard(title,content,extra){
  return '<div class="account-card" style="background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:16px 18px;margin-bottom:14px'+(extra||'')+'">'+(title?'<div style="font-size:12px;font-weight:700;color:var(--text);margin-bottom:12px">'+title+'</div>':'')+content+'</div>';
}
function acInput(id,label,val,type){
  return '<div style="margin-bottom:12px"><label style="display:block;font-size:10px;font-weight:600;color:var(--text4);text-transform:uppercase;letter-spacing:.05em;margin-bottom:5px">'+label+'</label><input id="'+id+'" type="'+(type||'text')+'" value="'+(val||'')+'" style="width:100%;padding:8px 11px;border-radius:8px;background:var(--inp-bg);border:1px solid var(--border2);color:var(--text);font-size:12px;box-sizing:border-box"></div>';
}
function acBtn(label,color,onclick){
  var bg=color==='primary'?'var(--accent)':color==='danger'?'#ef4444':'transparent';
  var border=color==='primary'?'var(--accent)':color==='danger'?'#ef4444':'var(--border2)';
  var clr=color==='primary'||color==='danger'?'#fff':'var(--text2)';
  return '<button onclick="'+(onclick||'')+'" style="padding:8px 18px;border-radius:8px;border:1px solid '+border+';background:'+bg+';color:'+clr+';font-size:12px;font-weight:600;cursor:pointer;margin-right:8px;margin-top:4px">'+label+'</button>';
}
function acBadge(label,color){
  var map={green:'rgba(16,185,129,.1)#10b981',blue:'rgba(99,102,241,.1)#818cf8',yellow:'rgba(245,158,11,.1)#f59e0b',red:'rgba(239,68,68,.08)#ef4444',gray:'rgba(107,114,128,.1)#9ca3af'};
  var p=(map[color]||map.gray).split('#');
  return '<span style="font-size:9px;font-weight:700;padding:2px 7px;border-radius:4px;background:'+p[0]+';color:#'+p[1]+';letter-spacing:.04em">'+label+'</span>';
}

function renderAccountBillingTab(){
  var ac=L().accountCenter||{};
  var lp=L().landing||{};
  // V1 scope: only current plan, next billing date, upgrade, cancel.
  // No usage analytics, payment method, billing history, invoices, team seats.
  var h='';
  // Honest demo note (subtle, doesn't hurt perceived product quality)
  h+='<div style="margin-bottom:14px"><span class="demo-note">'+(lp.demoPaymentNote||"Payments are not active in this demo")+'</span></div>';

  // ── Plan-driven billing card (reads PLAN_CONFIG + currentPlan) ──
  var _plan = getPlan();
  var _usage = getUsage();
  var _lm = (L().limits||{});
  var _isFree = _plan.priceNum === 0;
  var _priceLine = _isFree ? _plan.price : (_plan.price + ' / ' + (ac.monthly||'month'));

  h+=acCard('',
    '<div style="display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:14px;gap:12px">'+
    '<div>'+
    '<div style="font-size:11px;color:var(--text4);text-transform:uppercase;letter-spacing:.05em;font-weight:600;margin-bottom:4px">'+(_lm.currentPlanLabel||ac.currentPlan||'Current plan')+'</div>'+
    '<div style="font-size:20px;font-weight:700;color:var(--text)">'+_plan.name+'</div>'+
    '<div style="font-size:12px;color:var(--text3);margin-top:4px">'+_priceLine+'</div>'+
    (_isFree ? '' : '<div style="font-size:11px;color:var(--text4);margin-top:6px">'+(ac.nextBillingDate||'Next billing date')+': <b style="color:var(--text2)">May 30, 2026</b></div>')+
    '</div>'+acBadge(ac.active||'Active','green')+
    '</div>'+
    // Buttons: Upgrade always; Cancel only on paid plans
    '<div style="display:flex;gap:8px;flex-wrap:wrap">'+
      acBtn(_lm.upgradeBtn||ac.upgradePlan||'Upgrade plan','primary','')+
      (_isFree ? '' : acBtn(_lm.cancelSubBtn||ac.cancelSub||'Cancel subscription','secondary',''))+
    '</div>'
  );

  // ── Usage card ──
  function _usageRow(label, used, total){
    var pct = total ? Math.min(100, Math.round((used/total)*100)) : 0;
    var atLimit = used >= total;
    var color = atLimit ? '#ef4444' : (pct >= 80 ? '#f59e0b' : 'var(--accent)');
    return '<div style="margin-bottom:14px">'+
      '<div style="display:flex;justify-content:space-between;align-items:baseline;margin-bottom:6px">'+
        '<span style="font-size:12px;color:var(--text2);font-weight:500">'+label+'</span>'+
        '<span style="font-size:12px;color:var(--text);font-weight:600;font-variant-numeric:tabular-nums">'+used+' / '+total+'</span>'+
      '</div>'+
      '<div style="height:4px;background:var(--bg3);border-radius:3px;overflow:hidden">'+
        '<div style="height:100%;width:'+pct+'%;background:'+color+';transition:width .2s"></div>'+
      '</div>'+
    '</div>';
  }
  h+=acCard(_lm.usage||'Usage',
    _usageRow(_lm.projectsLabel||'Projects',         _usage.projects,         _plan.projects)+
    _usageRow(_lm.bmLabel||'Business Managers',      _usage.totalBM,          _plan.totalBM)+
    _usageRow(_lm.adAccountsLabel||'Meta Ad Accounts',_usage.totalAdAccounts, _plan.totalAdAccounts)
  );

  // ── Features (available + locked) ──
  // Feature map: key in PLAN_CONFIG → display label
  var featureMap = [
    {k:'salesAttribution', label:'Sales & Attribution'},
    {k:'utm',              label:'UTM Generator'},
    {k:'googleSheets',     label:'Google Sheets'},
    {k:'shopify',          label:'Shopify'},
    {k:'manualOrders',     label:'Manual Orders'},
    {k:'autoSync',         label:'Auto-sync'},
    {k:'prioritySync',     label:'Priority Sync'},
    {k:'prioritySupport',  label:'Priority Support'}
  ];
  var availableFeats = [], lockedFeats = [];
  featureMap.forEach(function(f){
    (_plan[f.k] ? availableFeats : lockedFeats).push(f);
  });

  function _featChip(f, locked){
    var color = locked ? 'var(--text4)' : 'var(--accent-txt)';
    var bg    = locked ? 'var(--bg3)'   : 'var(--accent-bg)';
    var icon  = locked ? '&#128274;'    : '&#10003;';
    return '<div style="display:inline-flex;align-items:center;gap:6px;padding:5px 10px;border-radius:6px;background:'+bg+';color:'+color+';font-size:11px;font-weight:500;margin:0 6px 6px 0">'+
      '<span style="font-size:10px">'+icon+'</span>'+f.label+
    '</div>';
  }

  // Always show Decision Engine status
  var deLabel = _plan.decisionEngine === 'dashboard_only' ? 'Decision Engine — Dashboard only'
              : _plan.decisionEngine === 'advanced'       ? 'Decision Engine (Advanced)'
              : 'Decision Engine';
  var deLocked = _plan.decisionEngine === 'dashboard_only';

  if (availableFeats.length){
    h+=acCard(_lm.availableLabel||'Available',
      _featChip({label:'Dashboard'}, false)+
      _featChip({label:'Meta Ads'}, false)+
      availableFeats.map(function(f){ return _featChip(f, false); }).join('')+
      (deLocked ? '' : _featChip({label:deLabel}, false))
    );
  }
  if (lockedFeats.length || deLocked){
    h+=acCard(_lm.lockedFeatures||'Locked',
      (deLocked ? _featChip({label:'Decision Engine — full'}, true) : '')+
      lockedFeats.map(function(f){ return _featChip(f, true); }).join('')
    );
  }
  return h;
}

// MOBILE HELPERS
// ============================================================
function isMobile(){return window.innerWidth<=640;}

function toggleMobileSidebar(){
  var sb=document.getElementById("sidebar");
  var ov=document.getElementById("sidebar-overlay");
  if(!sb)return;
  if(sb.classList.contains("mob-open")){sb.classList.remove("mob-open");if(ov)ov.classList.remove("show");}
  else{sb.classList.remove("collapsed");sb.classList.add("mob-open");if(ov)ov.classList.add("show");}
}
function closeMobileSidebar(){
  var sb=document.getElementById("sidebar");var ov=document.getElementById("sidebar-overlay");
  if(sb)sb.classList.remove("mob-open");if(ov)ov.classList.remove("show");
}
function mobileNav(sec){closeMobileSidebar();nav(sec);}
function updateMobileNav(sec){
  ["dashboard","meta","sales"].forEach(function(id){
    var btn=document.getElementById("mn-"+id);
    if(btn)btn.classList.toggle("active",id===sec);
  });
  var more=document.getElementById("mn-more");
  if(more)more.classList.toggle("active",["utm","ds","settings"].indexOf(sec)>=0);
}
function updateMobileNavLabels(){
  var lng=L();
  var map={dashboard:"Dashboard",meta:"Meta",sales:"Sales",more:"More"};
  Object.keys(map).forEach(function(id){
    var el=document.getElementById("mn-lbl-"+id);
    if(el)el.textContent=map[id];
  });
}
window.addEventListener("resize",function(){if(!isMobile())closeMobileSidebar();});

// Current demo plan (change to test other states: "starter"|"operator"|"team"|"scale").
var currentPlan = "operator";

// Plan helper API used across the demo
function getPlan(){ return PLAN_CONFIG[currentPlan] || PLAN_CONFIG.operator; }
function hasFeature(key){ var p = getPlan(); return !!p[key]; }
function planName(id){ return (PLAN_CONFIG[id] && PLAN_CONFIG[id].name) || id; }

// Returns the smallest upgrade tier that unlocks a feature. Used in upgrade modals.
function getRequiredPlanFor(feature){
  var order = ["starter","operator","team","scale"];
  for (var i = 0; i < order.length; i++){
    var p = PLAN_CONFIG[order[i]];
    if (p[feature]) return order[i];
  }
  return "scale";
}

// Usage counters from current demo data (P.projects, BMs, ad accounts)
function getUsage(){
  var projects = (window.P && P.projects) ? P.projects.length : 1;
  var bms = 0, accs = 0;
  if (window.P && P.projects){
    P.projects.forEach(function(pr){
      if (!pr.bms) return;
      bms += pr.bms.length;
      pr.bms.forEach(function(bm){ if (bm.accounts) accs += bm.accounts.length; });
    });
  }
  return { projects: projects, totalBM: bms, totalAdAccounts: accs };
}

// Project-limit check used by Create Project flow.
function checkProjectLimit(){
  var u = getUsage(), p = getPlan();
  if (u.projects >= p.projects){
    showLimitModal('project');
    return false;
  }
  return true;
}

// Generic locked/upgrade modal. `feature` is a PLAN_CONFIG flag, or '' for generic.
function showUpgradeModal(feature, contextLabel){
  var p = getPlan(); var lng = L(); var lm = lng.limits || {};
  var requiredPlan = feature ? getRequiredPlanFor(feature) : 'operator';
  var requiredName = planName(requiredPlan);
  // Build copy
  var title = (lm.featureLockedTitle || "This feature is not on your plan");
  var text  = (lm.featureLockedText  || "Upgrade your plan or contact support to unlock it.");
  if (contextLabel){
    title = (lm.featureOn || "{name} is available on") + ' ' + requiredName;
    title = title.replace('{name}', contextLabel);
  }
  return _renderUpgradeOverlay(title, text, requiredName);
}

// Specific limit modals — projects / BMs / ad accounts
function showLimitModal(kind){
  var p = getPlan(); var lng = L(); var lm = lng.limits || {};
  var titles = {
    project:   (lm.projectLimitTitle   || "Project limit reached"),
    bm:        (lm.bmLimitTitle        || "Business Manager limit reached"),
    adAccount: (lm.adAccountLimitTitle || "Ad account limit reached")
  };
  var bodies = {
    project:   (lm.projectLimitText   || "Your plan allows up to {n} projects.").replace('{n}', p.projects),
    bm:        (lm.bmLimitText        || "Your plan allows {n} Business Manager per project.").replace('{n}', p.bmPerProject),
    adAccount: (lm.adAccountLimitText || "Your plan allows {n} Meta ad account per Business Manager.").replace('{n}', p.adAccountsPerBM)
  };
  // Required: next tier above current
  var order = ["starter","operator","team","scale"];
  var idx = order.indexOf(currentPlan);
  var requiredName = idx < order.length-1 ? planName(order[idx+1]) : planName('scale');
  return _renderUpgradeOverlay(titles[kind] || titles.project, bodies[kind] || bodies.project, requiredName);
}

function renderAppView(){
  var lp=document.getElementById("landing-page");
  var auth=document.getElementById("auth-screen");
  var hub=document.getElementById("projects-hub");
  var app=document.getElementById("app");
  if(!APP_STATE||!APP_STATE.view) APP_STATE={view:"landing",activeProject:null,isAuthenticated:false,user:null,authMode:"login"};
  function hide(el){if(el){el.style.display="none";}}
  function show(el,d){if(el){el.style.display=d||"block";}}

  // LANDING
  if(APP_STATE.view==="landing"){
    hide(auth); hide(hub); hide(app);
    if(lp){lp.style.display="block";renderLandingPage();}
    return;
  }
  // AUTH
  if(APP_STATE.view==="auth"){
    hide(lp); show(auth); hide(hub); hide(app);
    renderAuthScreen();
    return;
  }
  // LOADING
  if(APP_STATE.view==="loading"){
    hide(lp); hide(auth); hide(app);
    show(hub); if(hub) hub.innerHTML=renderLoadingState();
    return;
  }
  // EMPTY: legacy state, treat as HUB — renderProjectsHub() already has
  // a built-in empty state for the no-projects case.
  if(APP_STATE.view==="empty"){
    hide(lp); hide(auth); hide(app);
    show(hub); renderProjectsHub();
    return;
  }
  // HUB
  if(APP_STATE.view==="hub"&&APP_STATE.isAuthenticated){
    hide(lp); hide(auth); hide(app);
    show(hub); renderProjectsHub();
    return;
  }
  // PLATFORM
  if(APP_STATE.view==="platform"&&APP_STATE.isAuthenticated&&APP_STATE.activeProject&&P[APP_STATE.activeProject]){
    hide(lp); hide(auth); hide(hub);
    show(app,"flex"); if(app) app.style.opacity="1";
    ST.pid=APP_STATE.activeProject; ST.sec="dashboard";
    buildSB();
    if(typeof updateMobileNavLabels==="function") updateMobileNavLabels();
    ensureBackToProjectsButton();
    if(typeof nav==="function") nav("dashboard");
    return;
  }
  // FALLBACK
  APP_STATE.view=APP_STATE.isAuthenticated?"hub":"landing";
  APP_STATE.activeProject=null;
  renderAppView();
}

function openProjectsHub(){
  resetPlatformUiState();
  APP_STATE.view="hub"; APP_STATE.activeProject=null;
  renderAppView();
}
function backToProjects(){
  resetPlatformUiState();
  APP_STATE.view="hub";
  APP_STATE.activeProject=null;
  renderAppView();
}

function projectHasData(project){
  return !!(project && project.bms && Array.isArray(project.bms) && project.bms.length>0);
}

function importDemoDataToProject(pid){
  if(!pid||!P[pid]) return;
  var source=P["beef"]||P["nails"]||P["fashion"];
  if(!source||!source.bms) return;
  try{
    P[pid].bms=JSON.parse(JSON.stringify(source.bms));
    P[pid].type=P[pid].type||"Demo Project";
    if(APP_STATE.activeProject===pid) renderAppView();
  }catch(e){ console.warn("importDemoData failed:",e); }
}

function launchProject(pid){
  if(!pid||!P[pid]){
    APP_STATE.view="hub"; APP_STATE.activeProject=null;
    renderAppView(); return;
  }
  resetPlatformUiState();
  APP_STATE.view="platform";
  APP_STATE.activeProject=pid;
  renderAppView();
}

    });

    /* Add project card */
    h+='<div id="hub-add-card" style="background:transparent;border:1.5px dashed var(--border2);border-radius:14px;padding:28px 20px;cursor:pointer;transition:all .18s;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;min-height:180px">';
      h+='<div style="width:44px;height:44px;border-radius:50%;background:var(--hover-bg);display:flex;align-items:center;justify-content:center;font-size:22px;color:var(--text4)">+</div>';
      h+='<div style="font-size:13px;font-weight:600;color:var(--text3)">'+(ph.createProject||"")+'</div>';
      h+='<div style="font-size:11px;color:var(--text4);text-align:center;max-width:160px;line-height:1.4">'+(ph.connectAndTrack||"")+'</div>';
    h+='</div>';

    h+='</div>'; /* /grid */
  }

  h+='</div>'; /* /content */

  el.innerHTML=h;

  /* Wire events */
  var thm=document.getElementById("hub-theme-btn");
  if(thm) thm.addEventListener("click",function(e){
    e.stopPropagation();
    var next=ST.theme==="dark"?"light":"dark";
    document.documentElement.setAttribute("data-theme",next);
    ST.theme=next;
    try{localStorage.setItem("adcontrol-theme",next);}catch(ex){}
    renderProjectsHub();
  });
  var _logoutBtn=document.getElementById("hub-logout-btn");
  if(_logoutBtn) _logoutBtn.addEventListener("click",function(e){e.stopPropagation();logoutUser();});
  var ub=document.getElementById("hub-user-btn");
  if(ub){
    ub.addEventListener("mouseenter",function(){this.style.background="var(--hover-bg)";});
    ub.addEventListener("mouseleave",function(){this.style.background="transparent";});
    ub.addEventListener("click",function(e){e.stopPropagation();openAccountCenter();});
  }
  el.querySelectorAll(".hub-lang-btn").forEach(function(btn){
    btn.addEventListener("click",function(e){
      e.stopPropagation();
      var code=btn.getAttribute("data-lang");
      if(code) setLang(code);
    });
  });
  var nb=document.getElementById("hub-new-btn"); if(nb) nb.addEventListener("click",function(e){e.stopPropagation();openAddProjectModal();});
  var cb=document.getElementById("hub-create-btn"); if(cb) cb.addEventListener("click",function(e){e.stopPropagation();openAddProjectModal();});
  var ab=document.getElementById("hub-add-card");
  if(ab){
    ab.addEventListener("click",function(e){e.stopPropagation();openAddProjectModal();});
    ab.addEventListener("mouseenter",function(){ab.style.borderColor="var(--accent)";ab.style.background="var(--accent-bg)";});
    ab.addEventListener("mouseleave",function(){ab.style.borderColor="var(--border2)";ab.style.background="transparent";});
  }
  var cards=el.querySelectorAll(".ph-card[data-pid]");
  for(var ci=0;ci<cards.length;ci++){
    (function(card){
      card.addEventListener("click",function(e){e.preventDefault();e.stopPropagation();var pid=card.getAttribute("data-pid");if(pid&&P[pid])launchProject(pid);});
      card.addEventListener("mouseenter",function(){card.style.borderColor="var(--accent)";card.style.transform="translateY(-2px)";card.style.boxShadow="0 6px 28px rgba(99,102,241,.12)";});
      card.addEventListener("mouseleave",function(){card.style.borderColor="var(--border)";card.style.transform="translateY(0)";card.style.boxShadow="none";});
    })(cards[ci]);
  }
}


// ============================================================
// STARTUP
// ============================================================
function initApp(){
  // Defensive: if a previous session had Spanish/German selected, fall back to English
  if(!LANGS[ST.lang]) ST.lang="en";
  initTheme();
  buildLangSwitcher();
  buildSB();
  if(typeof updateMobileNavLabels==="function") updateMobileNavLabels();
  setTimeout(function(){if(typeof updateDPLabel==="function")updateDPLabel();},100);
  APP_STATE.view="landing";
  APP_STATE.isAuthenticated=false;
  APP_STATE.activeProject=null;
  renderAppView();
}
initApp();





























































































































</script>
<div id="account-center"></div>
</body>
