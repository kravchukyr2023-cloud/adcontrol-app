<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
<meta name="mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<title>AdControl</title>
<style>
/* ════════════════════════════════════════════════════════════════════════════
   AdControl — CSS structure
   ──────────────────────────────────────────────────────────────────────────
   1.  Design tokens         — :root variables for dark / light themes
   2.  Base layout           — html, body, scrollbars, app shell, sidebar, topbar
   3.  Sidebar               — logo, projects, nav items, user block
   4.  Cards & metrics       — .card, .metric-card, .metric-grid
   5.  Tables                — th/td, status badges, hover states
   6.  Tabs / filters        — .tabs, .tab, .frow, .fbtn
   7.  Charts                — .charts-row, .chart-card, .chart-wrap
   8.  Engine cards          — .engine-card / decision visuals
   9.  Tree / drill          — .tree-btn, .tarr, .tmets
   10. Settings / sections   — .section, .stsec, .strow, .sttl
   11. Date picker           — #dp-* dropdown
   12. Theme toggle          — .theme-toggle-wrap, .theme-pill
   13. Mobile nav + sidebar  — #mobile-nav, sidebar drawer behavior
   14. Recommendation drawer — #recommendation-drawer (right slide-in)
   15. Projects Hub          — #projects-hub, .ph-card
   16. Account Center        — #account-center (right slide-in)
   17. Auth screen           — #auth-screen
   18. Landing page          — #landing-page, .landing-header
   19. Utility classes       — .btn-*, .section-head, .app-card, .demo-note
   ════════════════════════════════════════════════════════════════════════════ */

/* ── 1. Design tokens ──────────────────────────────────────────────────── */
:root,[data-theme="dark"]{
  --bg:#0c0e18;--bg2:#0f1117;--bg3:#1a1d27;--bg4:#12141e;
  --border:rgba(255,255,255,.07);--border2:rgba(255,255,255,.12);
  --text:#fff;--text2:#d1d5db;--text3:#9ca3af;--text4:#6b7280;--text5:#4b5563;
  --accent:#6366f1;--accent-bg:rgba(99,102,241,.2);--accent-txt:#a5b4fc;--accent-brd:rgba(99,102,241,.3);
  --hover-bg:rgba(255,255,255,.05);--row-hover:rgba(255,255,255,.02);--th-bg:rgba(255,255,255,.02);
  --engine-border:rgba(99,102,241,.25);--engine-bg:rgba(99,102,241,.08);
  --shadow:0 8px 24px rgba(0,0,0,.5);--scroll:#333;
  --inp-bg:#1a1d27;--code-bg:rgba(0,0,0,.4);
  --metric-bg:#1a1d27;--drill-bg:rgba(0,0,0,.15);--bm-header:#0f1117;
  --mob-nav-bg:#0f1117;
  --green:#4ade80;--yellow:#fbbf24;--red:#f87171;--blue:#60a5fa;--cyan:#67e8f9;
  --green-bg:rgba(74,222,128,.1);--yellow-bg:rgba(251,191,36,.1);
  --red-bg:rgba(248,113,113,.1);--blue-bg:rgba(96,165,250,.1);
  --green-brd:rgba(74,222,128,.15);--red-brd:rgba(248,113,113,.15);
  --adset-line:rgba(99,102,241,.3);
  --toggle-knob:#9ca3af;--toggle-off:rgba(255,255,255,.05);
}
[data-theme="light"]{
  --bg:#f0f2f8;--bg2:#ffffff;--bg3:#ffffff;--bg4:#f5f6fa;
  --border:rgba(0,0,0,.08);--border2:rgba(0,0,0,.14);
  --text:#111827;--text2:#374151;--text3:#6b7280;--text4:#9ca3af;--text5:#d1d5db;
  --accent:#4f46e5;--accent-bg:rgba(79,70,229,.1);--accent-txt:#4338ca;--accent-brd:rgba(79,70,229,.25);
  --hover-bg:rgba(0,0,0,.04);--row-hover:rgba(0,0,0,.02);--th-bg:rgba(0,0,0,.03);
  --engine-border:rgba(79,70,229,.2);--engine-bg:rgba(79,70,229,.05);
  --shadow:0 4px 20px rgba(0,0,0,.1);--scroll:#c9cdd8;
  --inp-bg:#f5f6fa;--code-bg:rgba(0,0,0,.05);
  --metric-bg:#ffffff;--drill-bg:rgba(79,70,229,.03);--bm-header:#f0f2f8;
  --mob-nav-bg:#ffffff;
  --green:#16a34a;--yellow:#d97706;--red:#dc2626;--blue:#2563eb;--cyan:#0891b2;
  --green-bg:rgba(22,163,74,.1);--yellow-bg:rgba(217,119,6,.1);
  --red-bg:rgba(220,38,38,.1);--blue-bg:rgba(37,99,235,.1);
  --green-brd:rgba(22,163,74,.2);--red-brd:rgba(220,38,38,.2);
  --adset-line:rgba(79,70,229,.2);
  --toggle-knob:#fff;--toggle-off:rgba(0,0,0,.08);
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;font-family:'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--text);font-size:13px}
body{overflow:hidden}
::-webkit-scrollbar{width:5px;height:5px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--scroll);border-radius:4px}
button{cursor:pointer;font-family:inherit;font-size:12px;color:inherit}
select,input{font-family:inherit;font-size:12px;color:var(--text);background:var(--inp-bg);border:1px solid var(--border2);border-radius:8px;padding:5px 10px;outline:none}
select option{background:var(--bg3);color:var(--text)}
#app{display:flex;height:100vh;overflow:hidden}
#sidebar{width:220px;min-width:220px;background:var(--bg2);border-right:1px solid var(--border);display:flex;flex-direction:column;transition:width .2s,transform .25s;overflow:hidden;z-index:200}
#sidebar.collapsed{width:52px;min-width:52px}
#main{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0}
#topbar{height:52px;min-height:52px;background:var(--bg2);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 16px;gap:10px}
#content-wrap{display:flex;flex:1;overflow:hidden;min-height:0}
#content{flex:1;overflow-y:auto;padding:18px}
.sb-logo{height:52px;display:flex;align-items:center;padding:0 14px;gap:10px;border-bottom:1px solid var(--border);flex-shrink:0}
.sb-logo-icon{width:28px;height:28px;min-width:28px;border-radius:8px;background:var(--accent);display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:900;color:#fff}
.sb-logo-text{font-weight:700;font-size:13px;white-space:nowrap;color:var(--text)}
.sb-projects{padding:10px;border-bottom:1px solid var(--border);flex-shrink:0}
.sb-label{font-size:9px;color:var(--text4);text-transform:uppercase;letter-spacing:.07em;padding:0 6px;margin-bottom:6px}
.sb-proj{width:100%;text-align:left;padding:7px 10px;border-radius:8px;border:none;background:transparent;color:var(--text3);transition:all .15s;margin-bottom:2px;display:block}
.sb-proj:hover{background:var(--hover-bg);color:var(--text)}
.sb-proj.active{background:var(--accent-bg);color:var(--accent-txt);outline:1px solid var(--accent-brd)}
.sb-proj-name{font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-size:11px}
.sb-proj-type{font-size:9px;color:var(--text5);margin-top:1px}
.sb-nav{flex:1;padding:10px 8px;display:flex;flex-direction:column;gap:2px;overflow-y:auto}
.sb-nav-item{display:flex;align-items:center;gap:10px;padding:10px;border-radius:8px;border:none;background:transparent;color:var(--text4);width:100%;text-align:left;transition:all .15s;white-space:nowrap;font-size:13px}
.sb-nav-item:hover{background:var(--hover-bg);color:var(--text2)}
.sb-nav-item.active{background:var(--accent-bg);color:var(--accent-txt)}
.sb-nav-icon{font-size:16px;min-width:20px;text-align:center}
.sb-user{padding:10px 14px;border-top:1px solid var(--border);display:flex;align-items:center;gap:10px;flex-shrink:0}
.sb-avatar{width:28px;height:28px;min-width:28px;border-radius:50%;background:linear-gradient(135deg,#6366f1,#a855f7);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:#fff}
.card{background:var(--bg3);border:1px solid var(--border);border-radius:12px}
.metric-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:10px;margin-bottom:18px}
.metric-card{background:var(--metric-bg);border:1px solid var(--border);border-radius:12px;padding:14px 16px}
.metric-label{font-size:9px;color:var(--text3);text-transform:uppercase;letter-spacing:.06em;margin-bottom:6px}
.metric-value{font-size:20px;font-weight:700;color:var(--text);margin-bottom:6px}
.metric-footer{font-size:11px;font-weight:600;display:flex;justify-content:space-between;align-items:center}
.up{color:var(--green)}.down{color:var(--red)}
.sg{color:var(--green)}.sw{color:var(--yellow)}.sb2{color:var(--red)}
.table-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch}
table{width:100%;border-collapse:collapse;font-size:11px}
th{text-align:left;padding:9px 14px;color:var(--text4);text-transform:uppercase;font-size:9px;letter-spacing:.05em;font-weight:600;background:var(--th-bg);white-space:nowrap}
td{padding:9px 14px;border-top:1px solid var(--border);color:var(--text2);vertical-align:middle}
tr:hover td{background:var(--row-hover)}
.tdn{max-width:240px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:var(--text);font-weight:500}
.tds{font-size:9px;color:var(--text4);margin-top:2px}
.tdm{font-family:monospace;font-size:10px;color:var(--cyan)}
.tdw{color:var(--text);font-weight:500;white-space:nowrap}
.rg{color:var(--green);font-weight:700}.ro{color:var(--yellow);font-weight:700}.rb{color:var(--red);font-weight:700}
.badge{display:inline-block;padding:2px 8px;border-radius:20px;font-size:9px;font-weight:600;border:1px solid}
.ba{background:var(--green-bg);color:var(--green);border-color:var(--green-brd)}
.bp{background:var(--yellow-bg);color:var(--yellow);border-color:rgba(217,119,6,.3)}
.bl{background:var(--blue-bg);color:var(--blue);border-color:rgba(99,102,241,.3)}
.pill{display:inline-block;font-size:9px;font-weight:600;padding:2px 8px;border-radius:10px}
.pok{background:var(--green-bg);color:var(--green)}
.pwn{background:var(--yellow-bg);color:var(--yellow)}
.per{background:var(--red-bg);color:var(--red)}
.pin{background:var(--blue-bg);color:var(--blue)}
.charts-row{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:18px}
.chart-card{background:var(--bg3);border:1px solid var(--border);border-radius:12px;padding:18px}
.chart-title{font-size:12px;font-weight:600;color:var(--text2);margin-bottom:14px}
.chart-wrap{position:relative;height:180px}
.engine-card{background:var(--bg3);border:1px solid var(--engine-border);border-radius:12px;padding:18px;margin-bottom:18px}
.engine-header{display:flex;align-items:center;gap:8px;margin-bottom:10px}
.engine-icon{width:24px;height:24px;border-radius:50%;background:var(--accent-bg);display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:var(--accent-txt)}
.engine-title{font-size:12px;font-weight:600;color:var(--accent-txt)}
.engine-body{font-size:12px;color:var(--text2);line-height:1.7}
.tree-btn{display:flex;align-items:center;gap:8px;padding:8px 0;border:none;background:none;color:var(--text2);width:100%;text-align:left;border-top:1px solid var(--border)}
.tree-btn:hover{background:var(--hover-bg)}
.tarr{font-size:9px;color:var(--text4);transition:transform .15s;display:inline-block;min-width:10px}
.tarr.open{transform:rotate(90deg)}
.tname{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-size:11px}
.tmets{display:flex;gap:12px;font-size:10px;color:var(--text3);flex-shrink:0}
.ttag{font-size:9px;font-weight:700;padding:1px 6px;border-radius:4px}
.tbm{background:var(--accent-bg);color:var(--accent-txt)}
.tacc{background:rgba(6,182,212,.12);color:var(--cyan)}
.dg{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.dm{background:var(--bg4);border-radius:8px;padding:8px 10px;border:1px solid var(--border)}
.dml{font-size:9px;color:var(--text4);text-transform:uppercase;letter-spacing:.05em;margin-bottom:3px}
.dmv{font-size:13px;font-weight:600;color:var(--text)}
.tabs{display:flex;gap:4px;background:var(--bg3);border:1px solid var(--border);border-radius:12px;padding:4px;margin-bottom:16px}
.tab{flex:1;padding:8px 4px;border-radius:8px;border:none;background:transparent;color:var(--text3);font-size:11px;font-weight:500;transition:all .15s}
.tab:hover{color:var(--text2)}
.tab.active{background:var(--accent);color:#fff}
.frow{display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin-bottom:14px}
.fbtn{padding:5px 12px;border-radius:8px;border:1px solid var(--border);background:var(--bg3);color:var(--text3);font-size:11px;font-weight:500;transition:all .15s}
.fbtn:hover{color:var(--text)}
.fbtn.active{background:var(--accent);border-color:var(--accent);color:#fff}
.srch{background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:6px 12px;font-size:12px;color:var(--text);width:200px;outline:none}
.srch::placeholder{color:var(--text4)}
.tbtn{display:flex;align-items:center;gap:6px;padding:5px 12px;border-radius:8px;border:1px solid var(--border2);background:var(--hover-bg);color:var(--text3);font-size:11px;transition:all .15s}
.tbtn:hover{color:var(--text);background:var(--hover-bg)}
.tbtn-a{background:var(--accent-bg);border-color:var(--accent-brd);color:var(--accent-txt)}
.pgrid{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.section{display:none}.section.active{display:block}
.dsgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:14px}
.dscard{background:var(--bg3);border:1px solid var(--border);border-radius:12px;padding:16px;display:flex;justify-content:space-between;align-items:flex-start}
.dsbtn{font-size:10px;padding:4px 10px;border-radius:6px;background:var(--hover-bg);border:1px solid var(--border2);color:var(--text2)}
.utmc{background:var(--code-bg);border-radius:8px;padding:14px;font-family:monospace;font-size:12px;line-height:1.9;margin-bottom:16px;border:1px solid var(--border)}
.stsec{background:var(--bg3);border:1px solid var(--border);border-radius:12px;padding:18px;margin-bottom:14px;max-width:560px}
.sttl{font-size:13px;font-weight:600;color:var(--text2);margin-bottom:14px}
.strow{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;gap:12px}
.stlbl{font-size:12px;color:var(--text3)}
.lang-switcher{display:flex;gap:4px;margin-left:4px}
.lang-btn{padding:4px 8px;border-radius:6px;border:1px solid var(--border2);background:transparent;color:var(--text3);font-size:11px;font-weight:600;transition:all .15s}
.lang-btn:hover{color:var(--text);border-color:var(--border2)}
.lang-btn.active{background:var(--accent-bg);border-color:var(--accent-brd);color:var(--accent-txt)}
/* Theme toggle pill */
.theme-toggle-wrap{display:flex;align-items:center;gap:6px;padding:4px 10px;border-radius:20px;border:1px solid var(--border2);background:var(--hover-bg);cursor:pointer;transition:all .2s;flex-shrink:0}
.theme-toggle-wrap:hover{border-color:var(--accent-brd)}
.theme-pill{width:28px;height:16px;border-radius:8px;background:var(--toggle-off,rgba(255,255,255,.08));border:1px solid var(--border2);position:relative;transition:background .2s;flex-shrink:0}
.theme-pill::after{content:"";position:absolute;top:2px;left:2px;width:10px;height:10px;border-radius:50%;background:var(--text4);transition:all .2s}
[data-theme="light"] .theme-pill{background:var(--accent);border-color:var(--accent)}
[data-theme="light"] .theme-pill::after{left:14px;background:#fff}
.theme-icon{font-size:12px;line-height:1;user-select:none}
#mobile-nav{display:none;position:fixed;bottom:0;left:0;right:0;height:58px;background:var(--mob-nav-bg);border-top:1px solid var(--border);z-index:500;align-items:center;justify-content:space-around;padding:0 4px}
#mobile-nav button{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;padding:6px 8px;border:none;background:transparent;color:var(--text4);font-size:9px;min-width:44px;border-radius:8px;transition:all .15s;flex:1}
#mobile-nav button.active{color:var(--accent)}
#mobile-nav button span.nav-icon{font-size:18px;line-height:1}
#mobile-nav button span.nav-label{font-size:9px;font-weight:500;white-space:nowrap}
#sidebar-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:190;backdrop-filter:blur(2px)}
#sidebar-overlay.show{display:block}
#sidebar.collapsed .sb-logo-text,#sidebar.collapsed .sb-projects,#sidebar.collapsed .sb-nav-text,#sidebar.collapsed .sb-user-text{display:none}
#sidebar.collapsed .sb-nav-item{justify-content:center;padding:10px}
#sidebar.collapsed .sb-user{justify-content:center}
@media(max-width:900px){
  #sidebar{width:200px;min-width:200px}
  #sidebar.collapsed{width:48px;min-width:48px}
  .metric-grid{grid-template-columns:repeat(auto-fill,minmax(120px,1fr));gap:8px}
  .charts-row{grid-template-columns:1fr;gap:12px}
  .chart-wrap{height:160px}
  .pgrid{grid-template-columns:1fr}
  td{padding:8px 10px}th{padding:8px 10px}
}
@media(max-width:640px){
  /* Sidebar: slide-in drawer */
  #sidebar{
    left:0;top:0;bottom:0;
    min-width:0!important;
    transform:translateX(-110%);
    z-index:400;
    transition:transform .25s ease;
    box-shadow:4px 0 24px rgba(0,0,0,.4);
  }
  #sidebar.mob-open{transform:translateX(0)!important;}
  #sidebar.collapsed{transform:translateX(-110%)!important;}
  /* Main stays full width */
  #main{width:100%}
  /* App: column flex, full screen */
  #app{
    flex-direction:row;
    height:100vh;
    overflow:hidden;
  }
  /* Topbar compact */
  #topbar{padding:0 10px;gap:6px;height:50px;min-height:50px;}
  .topbar-hide-mobile{display:none!important}
  /* Content scrollable */
  #content{
    padding:12px 10px 70px 10px;
    overflow-y:auto;
    -webkit-overflow-scrolling:touch;
  }
  /* Show mobile bottom nav */
  #mobile-nav{display:flex;}
  
  /* Metrics: 2 cols */
  .metric-grid{grid-template-columns:1fr 1fr;gap:8px}
  .metric-value{font-size:15px}
  .metric-card{padding:10px 12px}
  /* Charts: single col */
  .charts-row{grid-template-columns:1fr;gap:10px}
  .chart-wrap{height:130px}
  .chart-card{padding:12px}
  /* Tables: scroll horizontally */
  .table-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch}
  td,th{padding:6px 8px;font-size:10px;white-space:nowrap}
  /* Filters */
  .frow{gap:4px;overflow-x:auto;flex-wrap:nowrap;padding-bottom:2px}
  .frow .fbtn,.fbtn{flex-shrink:0;padding:4px 8px;font-size:10px}
  .srch{min-width:140px;max-width:180px}
  /* Tabs */
  .tabs{overflow-x:auto;flex-wrap:nowrap}
  .tab{padding:7px 10px;font-size:11px;white-space:nowrap;flex:0 0 auto}
  /* Grids */
  .pgrid{grid-template-columns:1fr}
  .dsgrid{grid-template-columns:1fr}
  /* Settings */
  .strow{flex-direction:column;align-items:flex-start;gap:6px}
  .stsec{max-width:100%}
  /* Date picker: fixed position to avoid overflow */
  #dp-dd{
    min-width:0!important;
    max-height:75vh;
    overflow-y:auto;
  }
}
@media(max-width:380px){
  .metric-value{font-size:13px}
  #topbar{padding:0 8px;gap:4px}
  #content{padding:10px 8px 70px 8px}
  .fbtn{padding:3px 6px;font-size:9px}
  .tab{font-size:10px;padding:6px 8px}
}

#recommendation-drawer{pointer-events:none;position:fixed;top:0;right:0;width:420px;max-width:100vw;height:100vh;background:var(--bg3);border-left:1px solid var(--border2);z-index:910;overflow-y:auto;overflow-x:hidden;transform:translateX(100%);transition:transform .28s cubic-bezier(.4,0,.2,1);-webkit-overflow-scrolling:touch;}
#recommendation-drawer.open{pointer-events:auto;transform:translateX(0);}
@media(max-width:640px){#recommendation-drawer{inset:0;width:100vw;height:100dvh;max-width:none;border-left:none;padding-bottom:env(safe-area-inset-bottom,0);}}
body.drawer-open{overflow:hidden;}

/* ── Projects Hub ─────────────────────── */
#projects-hub{
  position:fixed;inset:0;z-index:900;
  background:var(--bg);
  overflow-y:auto;
  -webkit-overflow-scrolling:touch;
  display:block;
}
.ph-card{
  background:var(--bg2);border:1px solid var(--border);
  border-radius:14px;padding:20px;cursor:pointer;
  transition:border-color .15s,box-shadow .15s,transform .15s;
}
.ph-card:hover{
  border-color:var(--accent);transform:translateY(-2px);
  box-shadow:0 6px 24px rgba(99,102,241,.13);
}

/* ── Account Center ─────────────────────────────────────── */
#account-center{pointer-events:none;position:fixed;top:0;right:0;width:480px;max-width:100vw;height:100vh;background:var(--bg3);border-left:1px solid var(--border2);z-index:950;display:flex;flex-direction:column;transform:translateX(100%);transition:transform .28s cubic-bezier(.4,0,.2,1);overflow:hidden;}
#account-center.open{pointer-events:auto;transform:translateX(0);}
#ac-body{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;}
@media(max-width:640px){#account-center{inset:0;width:100vw;height:100dvh;max-width:none;border-left:none;}}
.ac-toggle.on{background:var(--accent)!important;}
.ac-toggle.on>div{left:18px!important;}

@keyframes spin{to{transform:rotate(360deg)}}
/* ── Auth Screen ─────────────────────────────────────────── */
#auth-screen{display:none;position:fixed;inset:0;z-index:9999;overflow:auto;}
@media(max-width:640px){
  #auth-screen .auth-panels{flex-direction:column!important;}
  #auth-screen .auth-left{display:none!important;}
  #auth-screen .auth-right{width:100%!important;min-height:100vh!important;}
}

/* ── Landing Page ──────────────────────────────────────── */
#landing-page{display:none;position:fixed;inset:0;background:var(--bg);height:100dvh;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;scroll-behavior:smooth;}
#landing-page section{width:100%;box-sizing:border-box;}
@media(max-width:640px){
  #landing-page nav{display:none!important;}
  #landing-page h1{font-size:26px!important;}
}

.landing-header{position:sticky;top:0;z-index:50;backdrop-filter:blur(18px);-webkit-backdrop-filter:blur(18px);background:rgba(12,14,24,.82);border-bottom:1px solid var(--border);}
[data-theme="light"] .landing-header{background:rgba(255,255,255,.85);}
@media(max-width:640px){#landing-page{height:100dvh;overflow-y:auto;}.landing-header{position:sticky;top:0;z-index:60;}}

/* ════════════════════════════════════════════════════════════════════════════
   UTILITY CLASSES — use these instead of inline styles in new code.
   Existing inline styles are kept to avoid breaking the demo; future
   refactors should migrate to these classes.
   ════════════════════════════════════════════════════════════════════════════ */

/* Buttons — consistent hierarchy */
.btn,.btn-primary,.btn-secondary,.btn-ghost,.btn-danger{
  display:inline-flex;align-items:center;justify-content:center;gap:6px;
  padding:9px 16px;border-radius:8px;font-family:inherit;font-size:12px;font-weight:600;
  cursor:pointer;border:1px solid transparent;transition:opacity .15s,background .15s,border-color .15s,color .15s;
  white-space:nowrap;line-height:1;
}
.btn-primary{background:var(--accent);color:#fff;border-color:var(--accent);}
.btn-primary:hover{opacity:.88;}
.btn-secondary{background:var(--accent-bg);color:var(--accent-txt);border-color:var(--accent-brd);}
.btn-secondary:hover{background:var(--hover-bg);}
.btn-ghost{background:transparent;color:var(--text3);border-color:var(--border2);}
.btn-ghost:hover{color:var(--text);border-color:var(--accent-brd);}
.btn-danger{background:#ef4444;color:#fff;border-color:#ef4444;}
.btn-danger:hover{opacity:.88;}
.btn-small{padding:6px 12px;font-size:11px;}
.btn:disabled,.btn-primary:disabled,.btn-secondary:disabled,.btn-ghost:disabled,.btn-danger:disabled{opacity:.5;cursor:not-allowed;}

/* Section head — consistent header for every section */
.section-head{display:flex;align-items:flex-start;justify-content:space-between;gap:16px;flex-wrap:wrap;margin-bottom:20px;}
.section-head h2{font-size:18px;font-weight:700;color:var(--text);margin:0 0 4px;line-height:1.3;}
.section-head p{font-size:12px;color:var(--text4);margin:0;max-width:560px;line-height:1.5;}
.section-actions{display:flex;align-items:center;gap:8px;flex-wrap:wrap;}

/* App-level card — for major content cards */
.app-card{background:var(--bg3);border:1px solid var(--border);border-radius:14px;}
.app-card-pad{padding:16px 20px;}

/* Demo badge — subtle note that something is a demo simulation */
.demo-note{display:inline-flex;align-items:center;gap:6px;padding:4px 10px;border-radius:20px;background:var(--hover-bg);border:1px solid var(--border2);color:var(--text4);font-size:10px;font-weight:500;letter-spacing:.02em;}
.demo-note::before{content:"\25CF";color:var(--accent);font-size:8px;}
</style>

   AdControl — frontend demo prototype
   ════════════════════════════════════════════════════════════════════════════

   TECHNICAL REBUILD NOTES (for future production version):
   ──────────────────────────────────────────────────────────────────────────
   This is a single-file frontend demo. All state lives in memory only.
   No real authentication, no real API integrations, no real payments.

   V1 production rebuild target stack:
     - Next.js (App Router)              — pages, server actions, route handlers
     - Supabase Auth                     — session, magic links, password reset
     - Supabase Postgres                 — users, projects, BMs, accounts, campaigns, orders, UTMs
     - Meta Ads API                      — OAuth, ad insights, async sync
     - Shopify API                       — orders, customers, revenue
     - Google Sheets API                 — sales data from a sheet
     - Wave / WayForPay                  — subscription billing
     - Rule-based Ad Decision Engine     — leak detection, scaling readiness, tasks

   TODO BACKEND (what needs a real implementation later):
   ──────────────────────────────────────────────────────────────────────────
     1.  Supabase Auth                   — session, password reset, social login
     2.  Projects                        — CRUD, switch active project
     3.  Meta Ads API integration        — OAuth, ad insights, async sync
     4.  Shopify integration             — webhook + REST, order ingestion
     5.  Google Sheets integration       — service account, sheet picker
     6.  UTM matching                    — link UTM tags to ad creatives → real ROAS
     7.  Ad Decision Engine rules        — leak / scaling / tracking diagnosis
     8.  Settings persistence            — monthly budget, target ROAS / CPA, revenue goal
     9.  Billing (Wave / WayForPay)      — Starter / Operator / Team / Scale plans
     10. Email + Telegram support        — contact-only, no ticket system in V1

   FILE STRUCTURE (sections in order):
   ──────────────────────────────────────────────────────────────────────────
     1.  Global state (ST, APP_STATE, salesState, settingsState, dsState)
     2.  Localization (LANGS — en / uk only)
     3.  Demo data (P — Florida Beef, Nails Academy, Vibe Streetwear)
     4.  Formatters & helpers (fc, fp, fx, fn, gP, gCamps, gTotals)
     5.  Routing / App state (renderAppView, launchProject, backToProjects)
     6.  Landing
     7.  Auth
     8.  Projects Hub
     9.  Platform Layout (sidebar, topbar, nav)
     10. Dashboard (rDash)
     11. Meta Ads (rMeta)
     12. Sales & Attribution (rSales)
     13. UTM Generator (rUTM)
     14. Data Sources (rDS)
     15. Settings / Business Control Center (rSettings)

     17. Account Center
     18. Mobile helpers
     19. Init
   ══════════════════════════════════════════════════════════════════════════ */

/* ── Global error guard ────────────────────────────────────────────────────
   Demo prototype: a single uncaught JS error must NOT produce a black screen
   for a user/investor walking through the flow. We log to console but do not
   surface a modal. Production should report to Sentry / Datadog instead. */
(function(){
  if(typeof window==="undefined") return;
  window.addEventListener("error",function(ev){
    try{ console.warn("[AdControl demo] caught error:", ev.message, ev.filename+":"+ev.lineno); }catch(e){}
  });
  window.addEventListener("unhandledrejection",function(ev){
    try{ console.warn("[AdControl demo] unhandled rejection:", ev.reason); }catch(e){}
  });
})();

function L(){return LANGS[ST.lang];}
function gP(){return P[ST.pid];}
function gCamps(p){
  var r=[];
  p.bms.forEach(function(bm){
    bm.accounts.forEach(function(acc){
      (acc.camps||[]).forEach(function(c){
        var rev   = c.rev   !=null?c.rev   :(c.roas ||0)*c.spend;
        var purch = c.purch !=null?c.purch  :(c.cpa  > 0?c.spend/c.cpa:0);
        var leads = c.leads !=null?c.leads  :0;
        var imp   = c.imp   !=null?c.imp    :(c.cpm  > 0?Math.round(c.spend/c.cpm*1000):0);
        var clicks= c.clicks!=null?c.clicks :(c.cpc  > 0?Math.round(c.spend/c.cpc):0);
        var ctr   = imp   >0?(clicks/imp)*100   :(c.ctr ||0);
        var cpc   = clicks>0?c.spend/clicks      :(c.cpc ||0);
        var cpm   = imp   >0?(c.spend/imp)*1000  :(c.cpm ||0);
        var roas  = c.spend>0?rev/c.spend         :0;
        var cpa   = purch >0?c.spend/purch        :(leads>0?c.spend/leads:0);
        var eas=(c.adsets||[]).map(function(as){
          var ar=as.rev   !=null?as.rev   :(as.roas||0)*as.spend;
          var ap=as.purch !=null?as.purch  :(as.cpa >0?Math.round(as.spend/as.cpa):0);
          var ai=as.imp   !=null?as.imp    :(as.cpm >0?Math.round(as.spend/as.cpm*1000):0);
          var ac=as.clicks!=null?as.clicks :(as.cpc >0?Math.round(as.spend/as.cpc):0);
          var ads2=(as.ads||[]).map(function(ad){
            var dr=ad.rev   !=null?ad.rev   :(ad.roas||0)*ad.spend;
            var dp=ad.purch !=null?ad.purch  :(ad.cpa >0?Math.round(ad.spend/ad.cpa):0);
            var di=ad.imp   !=null?ad.imp    :(ad.cpm >0?Math.round(ad.spend/ad.cpm*1000):0);
            var dc=ad.clicks!=null?ad.clicks :(ad.cpc >0?Math.round(ad.spend/ad.cpc):0);
            return Object.assign({},ad,{
              rev:dr,purch:dp,imp:di,clicks:dc,
              ctr: di>0?+((dc/di)*100).toFixed(2):(ad.ctr||0),
              cpc: dc>0?+(ad.spend/dc).toFixed(2) :(ad.cpc||0),
              cpm: di>0?+(ad.spend/di*1000).toFixed(2):(ad.cpm||0),
              roas:ad.spend>0?+(dr/ad.spend).toFixed(2):0,
              cpa: dp>0?+(ad.spend/dp).toFixed(2):(ad.cpa||0)
            });
          });
          return Object.assign({},as,{
            rev:ar,purch:ap,imp:ai,clicks:ac,
            ctr: ai>0?+((ac/ai)*100).toFixed(2):(as.ctr||0),
            cpc: ac>0?+(as.spend/ac).toFixed(2) :(as.cpc||0),
            cpm: ai>0?+(as.spend/ai*1000).toFixed(2):(as.cpm||0),
            roas:as.spend>0?+(ar/as.spend).toFixed(2):0,
            cpa: ap>0?+(as.spend/ap).toFixed(2):(as.cpa||0),
            ads:ads2
          });
        });
        r.push(Object.assign({},c,{
          bmn:bm.name,accn:acc.name,
          rev:rev,purch:purch,leads:leads,imp:imp,clicks:clicks,
          ctr: +ctr.toFixed(2),cpc:+cpc.toFixed(2),
          cpm: +cpm.toFixed(2),roas:+roas.toFixed(2),cpa:+cpa.toFixed(2),
          adsets:eas
        }));
      });
    });
  });
  return r;
}
function gTotals(p){
  var df=Math.min(1,getDays()/30);
  var s=0,rv=0,pu=0,le=0,im=0,cl=0,at=0;
  gCamps(p).forEach(function(c){
    s+=c.spend; rv+=c.rev; pu+=c.purch; le+=(c.leads||0);
    im+=(c.imp||0); cl+=(c.clicks||0); at+=(c.atc||0);
  });
  var Spend=s*df, Rev=rv*df, Purch=Math.round(pu*df), Leads=Math.round(le*df);
  var Imp=Math.round(im*df), Clicks=Math.round(cl*df), Atc=Math.round(at*df);
  return{
    spend:Spend, rev:Rev, purch:Purch, leads:Leads,
    imp:Imp, clicks:Clicks, atc:Atc,
    roas: Spend>0?+(Rev/Spend).toFixed(2):0,
    ctr:  Imp>0  ?+((Clicks/Imp)*100).toFixed(2):0,
    cpc:  Clicks>0?+(Spend/Clicks).toFixed(2):0,
    cpm:  Imp>0  ?+(Spend/Imp*1000).toFixed(2):0,
    cpa:  Purch>0?+(Spend/Purch).toFixed(2):(Leads>0?+(Spend/Leads).toFixed(2):0)
  };
}

function buildDPPresets(){
  var el=document.getElementById("dp-presets");
  if(!el)return;
  var presets=getDPPresets();
  var h="";
  presets.forEach(function(p){
    var active=ST.dpPreset===p.id;
    var dateHint="";
    if(p.special!=="custom"){
      // Temporarily set preset to compute its range
      var savedPreset=ST.dpPreset;
      ST.dpPreset=p.id;
      var r=getDateRange();
      ST.dpPreset=savedPreset;
      if(p.id==="today"||p.id==="yesterday"){
        dateHint=formatDate(r.from);
      } else {
        dateHint=formatDate(r.from)+" - "+formatDate(r.to);
      }
    }
    h+='<button onclick="event.stopPropagation();selectPreset(\''+p.id+'\')" style="width:100%;text-align:left;padding:9px 14px;background:'+(active?"rgba(99,102,241,.18)":"transparent")+';border:none;border-bottom:1px solid var(--border);cursor:pointer;font-size:12px;font-weight:'+(active?"600":"400")+';display:flex;align-items:center;justify-content:space-between;gap:8px">';
    h+='<span style="color:'+(active?"var(--accent-txt)":"var(--text2)")+'">'+p.label+'</span>';
    if(dateHint){
      h+='<span style="font-size:10px;color:'+(active?"var(--accent-txt)":"var(--text4)")+'">'+dateHint+'</span>';
    }
    h+='</button>';
  });
  el.innerHTML=h;
  // update custom section label
  var lng=L();
  var lbls=lng.dpPresets||{from:"From",to:"To",apply:"Apply","Custom range":"Custom range"};
  var cl=document.getElementById("dp-custom-label");
  if(cl)cl.textContent=lbls.custom||"Custom range";
  var fl=document.getElementById("dp-from-label");
  if(fl)fl.textContent=lbls.from||"From";
  var tl=document.getElementById("dp-to-label");
  if(tl)tl.textContent=lbls.to||"To";
  var ab=document.getElementById("dp-apply-btn");
  if(ab)ab.textContent=lbls.apply||"Apply";
}

function formatDate(d){
  // Format as "25 Apr" style
  var day=d.getDate();
  var months=["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
  return day+" "+months[d.getMonth()];
}

function getDateRange(){
  var now=new Date();
  var to=new Date(now.getFullYear(),now.getMonth(),now.getDate());
  var from=new Date(to);
  if(ST.dpPreset==="today"){
    // from=to=today
  } else if(ST.dpPreset==="yesterday"){
    to.setDate(to.getDate()-1);
    from=new Date(to);
  } else if(ST.dpPreset==="7d"){
    from.setDate(from.getDate()-6);
  } else if(ST.dpPreset==="30d"){
    from.setDate(from.getDate()-29);
  } else if(ST.dpPreset==="thismonth"){
    from=new Date(now.getFullYear(),now.getMonth(),1);
  } else if(ST.dpPreset==="lastmonth"){
    from=new Date(now.getFullYear(),now.getMonth()-1,1);
    to=new Date(now.getFullYear(),now.getMonth(),0);
  } else if(ST.dpPreset==="custom"){
    from=ST.dpFrom?new Date(ST.dpFrom):new Date(to);
    from.setDate(from.getDate()-6);
    to=ST.dpTo?new Date(ST.dpTo):new Date(to);
  }
  return{from:from,to:to};
}

function getDays(){
  var r=getDateRange();
  var diff=Math.round((r.to-r.from)/(1000*60*60*24))+1;
  return Math.max(1,diff);
}

function updateDPLabel(){
  var el=document.getElementById("dp-label");
  if(!el)return;
  var r=getDateRange();
  var fromStr=formatDate(r.from);
  var toStr=formatDate(r.to);
  if(ST.dpPreset==="today"||ST.dpPreset==="yesterday"){
    el.textContent=fromStr;
  } else {
    el.textContent=fromStr+" - "+toStr;
  }
}

function selectPreset(id){
  ST.dpPreset=id;
  var customDiv=document.getElementById("dp-custom");
  if(id==="custom"){
    if(customDiv)customDiv.style.display="block";
    buildDPPresets();
    var r=getDateRange();
    var fi=document.getElementById("dp-from");
    var ti=document.getElementById("dp-to");
    if(fi&&!fi.value)fi.value=r.from.toISOString().split("T")[0];
    if(ti&&!ti.value)ti.value=r.to.toISOString().split("T")[0];
  } else {
    if(customDiv)customDiv.style.display="none";
    var dd=document.getElementById("dp-dd");
    if(dd)dd.style.display="none";
    updateDPLabel();
    rAllSections();
  }
}
function applyCustomRange(){
  var fi=document.getElementById("dp-from");
  var ti=document.getElementById("dp-to");
  if(fi&&ti&&fi.value&&ti.value){
    ST.dpFrom=fi.value;
    ST.dpTo=ti.value;
    var dd=document.getElementById("dp-dd");
    if(dd)dd.style.display="none";
    updateDPLabel();
    rAllSections();
  }
}
function toggleDP(){
  var dd=document.getElementById("dp-dd");
  if(!dd)return;
  var opening=dd.style.display==="none";
  dd.style.display=opening?"block":"none";
  if(opening){
    buildDPPresets();
    var customDiv=document.getElementById("dp-custom");
    if(customDiv)customDiv.style.display=ST.dpPreset==="custom"?"block":"none";
  }
}

    var ago=Math.floor((now-o.ts)/86400000);
    if(ago>=0&&ago<days){
      var idx=days-1-ago;
      if(!dayBuckets[idx])dayBuckets[idx]={rev:0,purch:0};
      dayBuckets[idx].rev+=o.rev; dayBuckets[idx].purch+=1;
    }
  });
  return Array.from({length:days},function(_,i){
    var d=new Date(); d.setDate(d.getDate()-(days-1-i));
    var label=d.toLocaleDateString("en-US",{month:"short",day:"numeric"});
    var n1=0.50+((i*37+17)%100)/100*0.85;
    var n2=0.50+((i*53+11)%100)/100*0.85;
    var n3=0.50+((i*71+ 7)%100)/100*0.85;
    var spend  = Math.round((t.spend/days)*n1);
    var imp    = t.cpm  >0?Math.round(spend/t.cpm*1000):Math.round((t.imp/days)*n1);
    var clicks = imp    >0?Math.round(imp*t.ctr/100)    :Math.round((t.clicks/days)*n1);
    var rev    = Math.round((t.rev/days)*n2);
    var aov    = t.purch>0?t.rev/t.purch:0;
    var purch  = aov    >0?Math.max(0,Math.round(rev/aov)):Math.round((t.purch/days)*n3);
    var roas   = spend  >0?rev/spend:0;
    var ctr    = imp    >0?(clicks/imp)*100:0;
    var cpc    = clicks >0?spend/clicks:0;
    var cpm    = imp    >0?(spend/imp)*1000:0;
    var cpa    = purch  >0?spend/purch:0;
    var bkt=dayBuckets[i]||{rev:0,purch:0};
    var rr=bkt.rev, pr=bkt.purch;
    return{
      date:label,spend:spend,rev:rev,purch:purch,imp:imp,clicks:clicks,
      roas:+roas.toFixed(2),ctr:+ctr.toFixed(2),
      cpc:+cpc.toFixed(2),cpm:+cpm.toFixed(2),cpa:+cpa.toFixed(2),
      rev_real:rr,purch_real:pr,
      roas_real:+(spend>0&&rr>0?rr/spend:roas).toFixed(2),
      cpa_real:+(spend>0&&pr>0?spend/pr:cpa).toFixed(2)
    };
  });
}

function openRecommendationDrawer(type,bi,ai,ci,asi,adi){
  // Plan gate: Starter has decisionEngine:'dashboard_only' — drawer for campaign/adset/ad
  // diagnosis is unavailable. Show upgrade modal instead.
  if (typeof getPlan === 'function'){
    var _de = getPlan().decisionEngine;
    if (_de === 'dashboard_only'){
      if (typeof showUpgradeModal === 'function') showUpgradeModal('salesAttribution', 'Detailed Diagnosis');
      return;
    }
  }
  var p=gP(),c=p.cur,item=null;
  var df=Math.min(1,getDays()/30);
  try{
    if(type==='c'&&bi!=null){var camp=p.bms[bi].accounts[ai].camps[ci];item={name:camp.name,spend:camp.spend,roas:camp.roas,cpa:camp.cpa,ctr:camp.ctr,_spendFmt:fc(camp.spend*df,c),_cpaFmt:fc(camp.cpa,c)};}
    else if(type==='as'&&asi!=null){var as2=p.bms[bi].accounts[ai].camps[ci].adsets[asi];item={name:as2.name,spend:as2.spend,roas:as2.roas,cpa:as2.cpa,ctr:as2.ctr,_spendFmt:fc(as2.spend*df,c),_cpaFmt:fc(as2.cpa,c)};}
    else if(type==='ad'&&adi!=null){var ad2=p.bms[bi].accounts[ai].camps[ci].adsets[asi].ads[adi];item={name:ad2.name,spend:ad2.spend,roas:ad2.roas,cpa:ad2.cpa,ctr:ad2.ctr,_spendFmt:fc(ad2.spend*df,c),_cpaFmt:fc(ad2.cpa,c)};}
  }catch(e){item=null;}
  // Get or create drawer
  var dr=document.getElementById('recommendation-drawer');
  if(!dr){
    dr=document.createElement('div');
    dr.id='recommendation-drawer';
    document.body.appendChild(dr);
  }
  // Remember args so setLang can re-render drawer in new language
  dr._lastArgs = {type:type,bi:bi,ai:ai,ci:ci,asi:asi,adi:adi};
  // Remove open first (reset position), then re-add after paint
  dr.classList.remove('open');
  dr.innerHTML=renderRecommendationDrawer(type,item);
  document.body.classList.add('drawer-open');
  requestAnimationFrame(function(){
    requestAnimationFrame(function(){
      dr.classList.add('open');
    });
  });
}

// \u2500\u2500 Status config \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500
var ENGINE_STATUS = {
  CRITICAL:    {color:"#ef4444", bg:"rgba(239,68,68,.08)",    border:"rgba(239,68,68,.25)",    icon:"\u25CF"},
  WARNING:     {color:"#f59e0b", bg:"rgba(245,158,11,.08)",   border:"rgba(245,158,11,.25)",   icon:"\u25B2"},
  OPPORTUNITY: {color:"#10b981", bg:"rgba(16,185,129,.08)",   border:"rgba(16,185,129,.25)",   icon:"\u25C6"},
  STABLE:      {color:"#6366f1", bg:"rgba(99,102,241,.08)",   border:"rgba(99,102,241,.25)",   icon:"\u2713"}
};

// \u2500\u2500 Render one decision card \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500
// Localized status / priority labels (CRITICAL/WARNING/OPPORTUNITY/HIGH/MEDIUM/LOW).
// Internal status values remain English; this only changes the visible label.
function statusLabel(value){
  var lang=ST.lang||"en";
  var map={
    uk:{CRITICAL:"\u041A\u0440\u0438\u0442\u0438\u0447\u043D\u043E",WARNING:"\u0423\u0432\u0430\u0433\u0430",OPPORTUNITY:"\u041C\u043E\u0436\u043B\u0438\u0432\u0456\u0441\u0442\u044C",HIGH:"\u0412\u0438\u0441\u043E\u043A\u0438\u0439",MEDIUM:"\u0421\u0435\u0440\u0435\u0434\u043D\u0456\u0439",LOW:"\u041D\u0438\u0437\u044C\u043A\u0438\u0439",STABLE:"\u0421\u0442\u0430\u0431\u0456\u043B\u044C\u043D\u043E"},
    en:{CRITICAL:"Critical",WARNING:"Warning",OPPORTUNITY:"Opportunity",HIGH:"High",MEDIUM:"Medium",LOW:"Low",STABLE:"Stable"}
  };
  return (map[lang] && map[lang][value]) || value;
}

function renderDecisionCard(cfg){
  var de=L().adDecisionEngine||{};
  var st = ENGINE_STATUS[cfg.status]||ENGINE_STATUS.STABLE;
  var tid = cfg.taskId||('task-'+Math.random().toString(36).slice(2,7));
  return '<div id="'+tid+'" style="background:var(--bg2);border:1px solid '+st.border+';border-left:3px solid '+st.color+';border-radius:10px;padding:14px 16px;margin-bottom:10px">'+
    '<div style="display:flex;align-items:center;gap:8px;margin-bottom:10px">'+
      '<span style="font-size:9px;font-weight:700;letter-spacing:.08em;padding:2px 8px;border-radius:4px;background:'+st.bg+';color:'+st.color+'">'+statusLabel(cfg.status)+'</span>'+
      '<span style="font-size:13px;font-weight:700;color:var(--text)">'+cfg.title+'</span>'+
    '</div>'+
    '<div style="display:grid;gap:8px;font-size:11px">'+
      '<div><span style="font-size:9px;font-weight:700;color:var(--text4);text-transform:uppercase;letter-spacing:.06em;display:block;margin-bottom:2px">'+(de.impact||'')+'</span>'+
        '<span style="color:var(--text2)">'+cfg.impact+'</span></div>'+
      '<div><span style="font-size:9px;font-weight:700;color:var(--text4);text-transform:uppercase;letter-spacing:.06em;display:block;margin-bottom:2px">'+(de.diagnosis||'')+'</span>'+
        '<span style="color:var(--text2)">'+cfg.diagnosis+'</span></div>'+
      '<div><span style="font-size:9px;font-weight:700;color:var(--text4);text-transform:uppercase;letter-spacing:.06em;display:block;margin-bottom:2px">'+(de.action||'')+'</span>'+
        '<span style="color:var(--text2)">'+cfg.action+'</span></div>'+
      '<div><span style="font-size:9px;font-weight:700;color:var(--text4);text-transform:uppercase;letter-spacing:.06em;display:block;margin-bottom:2px">'+(de.expectedResult2||de.expectedResult||'')+'</span>'+
        '<span style="color:var(--text2)">'+cfg.expected+'</span></div>'+
    '</div>'+
    '<div style="display:flex;gap:8px;margin-top:12px">'+
      '<button onclick="acceptDecisionTask(\''+tid+'\')" style="padding:5px 14px;border-radius:7px;border:1px solid '+st.color+';background:'+st.bg+';color:'+st.color+';font-size:11px;font-weight:600;cursor:pointer">'+(de.acceptTask2||de.acceptTask||'')+'</button>'+
      '<button onclick="dismissDecisionTask(\''+tid+'\')" style="padding:5px 14px;border-radius:7px;border:1px solid var(--border2);background:transparent;color:var(--text4);font-size:11px;cursor:pointer">'+(de.dismiss||'')+'</button>'+
    '</div>'+
  '</div>';
}

// \u2500\u2500 Task accept / dismiss \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500
function acceptDecisionTask(tid){
  var el=document.getElementById(tid);
  if(!el)return;
  var de=L().adDecisionEngine||{};
  var note=de.taskAcceptedNote||'';
  el.style.opacity='.5';
  el.innerHTML='<div style="padding:8px 0;font-size:11px;color:var(--green);font-weight:600">\u2713 '+note+'</div>';
  setTimeout(function(){el.remove();},2000);
}
function dismissDecisionTask(tid){
  var el=document.getElementById(tid);
  if(!el)return;
  el.style.transition='opacity .3s';
  el.style.opacity='0';
  setTimeout(function(){el.remove();},300);
}

// \u2500\u2500 Dashboard \u2014 Ad Decision Engine panel \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500
function renderAdDecisionEnginePanel(){

  h+='<div style="display:flex;gap:2px;margin-bottom:16px;background:var(--bg2);border-radius:8px;padding:3px">';
  ['revenue-leaks','growth','tasks'].forEach(function(tab,i){

    h+='<button onclick="switchDecisionTab(\''+tab+'\')" id="decision-tab-'+tab+'" style="flex:1;padding:6px 10px;border-radius:6px;border:none;font-size:11px;font-weight:600;cursor:pointer;'+
      (active?'background:var(--bg3);color:var(--text);box-shadow:0 1px 3px rgba(0,0,0,.2);':'background:transparent;color:var(--text4);')+'">';

    h+='</button>';
  });
  h+='</div>';

  // Tab: Revenue Leaks
  h+='<div id="decision-panel-revenue-leaks">';
  deck.revenueLeaks.forEach(function(card){ h+=renderDecisionCard(card); });

  // Tab: Growth Opportunities
  h+='<div id="decision-panel-growth" style="display:none">';

  h+='</div>';

  // Tab: Priority Actions
  h+='<div id="decision-panel-tasks" style="display:none">';
  var expectedLbl=de.expected||'';
  var acceptLbl=de.accept||de.acceptTask||'';
  var dismissLbl=de.dismiss||'';
  deck.tasks.forEach(function(t){
    var pColor=t.priority==='HIGH'?'#ef4444':'#f59e0b';
    h+='<div id="ait-'+t.id+'" style="display:flex;align-items:flex-start;gap:12px;padding:12px 14px;background:var(--bg2);border:1px solid var(--border);border-radius:10px;margin-bottom:8px">';
    h+='<span style="font-size:9px;font-weight:700;padding:2px 7px;border-radius:4px;background:rgba(239,68,68,.08);color:'+pColor+';white-space:nowrap;margin-top:2px;letter-spacing:.06em">'+statusLabel(t.priority)+'</span>';
    h+='<div style="flex:1">';
    h+='<div style="font-size:12px;font-weight:600;color:var(--text);margin-bottom:3px">'+t.title+'</div>';
    h+='<div style="font-size:11px;color:var(--text4);margin-bottom:6px">'+t.reason+'</div>';
    h+='<div style="font-size:10px;color:var(--text3)">'+expectedLbl+': '+t.impact+'</div>';
    h+='</div>';
    h+='<div style="display:flex;flex-direction:column;gap:5px;min-width:90px">';
    h+='<button onclick="acceptDecisionTask(\'ait-'+t.id+'\')" style="padding:4px 10px;border-radius:6px;border:1px solid '+pColor+';background:transparent;color:'+pColor+';font-size:10px;font-weight:600;cursor:pointer">'+acceptLbl+'</button>';
    h+='<button onclick="dismissDecisionTask(\'ait-'+t.id+'\')" style="padding:4px 10px;border-radius:6px;border:1px solid var(--border2);background:transparent;color:var(--text4);font-size:10px;cursor:pointer">'+dismissLbl+'</button>';
    h+='</div>';
    h+='</div>';
  });
  h+='</div>';

  h+='</div></div>';
  return h;
}

// Tab switcher
function switchDecisionTab(tab){
  ['revenue-leaks','growth','tasks'].forEach(function(t){
    var panel=document.getElementById('decision-panel-'+t);
    var btn=document.getElementById('decision-tab-'+t);
    if(!panel||!btn)return;
    var active=t===tab;
    panel.style.display=active?'block':'none';
    if(active){btn.style.background='var(--bg3)';btn.style.color='var(--text)';btn.style.boxShadow='0 1px 3px rgba(0,0,0,.2)';}
    else{btn.style.background='transparent';btn.style.color='var(--text4)';btn.style.boxShadow='';}
  });
}

// \u2500\u2500 Meta Ads recommendation drawer \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500
function renderRecommendationDrawer(type, item, meta){
  var de=L().adDecisionEngine||{};
  var h='';
  h+='<div style="padding:18px 20px;height:100%;overflow-y:auto">';
  h+='<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:4px">';
  h+='<div>';
  h+='<div style="display:flex;align-items:center;gap:7px">';
  h+='<div style="width:7px;height:7px;border-radius:50%;background:#6366f1"></div>';
  h+='<span style="font-size:14px;font-weight:700;color:var(--text)">Ad Decision Engine</span>';
  h+='</div>';
  h+='<div style="font-size:10px;color:var(--text4);margin-top:2px">'+(de.subtitle||'')+'</div>';
  h+='</div>';
  h+='<button onclick="closeRecommendationDrawer()" style="background:var(--hover-bg);border:1px solid var(--border2);color:var(--text3);cursor:pointer;border-radius:7px;width:28px;height:28px;font-size:14px;display:flex;align-items:center;justify-content:center">\u2715</button>';
  h+='</div>';

  // Item info
  if(item){
    h+='<div style="margin:12px 0 16px;padding:10px 12px;background:var(--bg2);border-radius:8px;border:1px solid var(--border)">';
    h+='<div style="font-size:9px;color:var(--text4);text-transform:uppercase;letter-spacing:.06em;margin-bottom:4px">'+
      (type==='c'?(de.campaign||'Campaign'):type==='as'?(de.adSet||'Ad Set'):(de.adCreative||'Ad / Creative'))+'</div>';
    h+='<div style="font-size:12px;font-weight:600;color:var(--text);margin-bottom:6px">'+item.name+'</div>';
    h+='<div style="display:flex;gap:12px;flex-wrap:wrap">';
    var spendLbl=de.spend||'Spend';
    if(item.spend!=null) h+='<div style="font-size:10px;color:var(--text3)">'+spendLbl+' <b style="color:var(--text)">'+item._spendFmt+'</b></div>';
    if(item.roas!=null)  h+='<div style="font-size:10px;color:var(--text3)">ROAS <b style="color:var(--text)">'+item.roas+'x</b></div>';
    if(item.cpa!=null)   h+='<div style="font-size:10px;color:var(--text3)">CPA <b style="color:var(--text)">'+item._cpaFmt+'</b></div>';
    if(item.ctr!=null)   h+='<div style="font-size:10px;color:var(--text3)">CTR <b style="color:var(--text)">'+item.ctr+'%</b></div>';
    h+='</div>';
    h+='</div>';
  }

  // Section heading
  var sectionLabel;
  if(type==='c')       sectionLabel = de.campaignDiagnosis  || '';
  else if(type==='as') sectionLabel = de.adSetDiagnosis     || '';
  else                 sectionLabel = de.creativeDiagnosis  || '';
  h+='<div style="font-size:11px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.07em;margin-bottom:10px">'+sectionLabel+'</div>';

  // Pull localized drawer cards
  var dk=getDrawerDeck();

// \u2500\u2500 Generate orders for period \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500
// \u2500\u2500 Orders cache \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500
var _ordersCache={};

function genOrders(p,days){
  var key=p.id+"_"+days;
  if(_ordersCache[key]) return _ordersCache[key].concat(salesState.customOrders||[]);

  var camps=gCamps(p);
  var df=Math.min(1,days/30);
  var names=["Alex M.","Sara T.","Mike R.","Jessica L.","Chris P.",
             "Anna K.","David W.","Emma S.","Tom B.","Linda F.","Paul N.","Maria V."];
  var prods=p.id==="beef"
    ?["Ground Beef Box","Ribeye 2-Pack","Tenderloin Pack","Family Bundle","Premium Box"]
    :p.id==="nails"
    ?["Gel Master Course","Pedicure Master","Marathon 29EUR","BFCM Bundle","Free + Upsell"]
    :["Hoodie Drop 01","Streetwear Tee","Chain Necklace","Full Bundle","Cargo Pants"];

  var allOrders=[];
  var now=Date.now();
  var winMs=days*86400000;

  camps.forEach(function(camp){
    var campPurch=Math.round((camp.purch||0)*df);
    var campRev=(camp.rev||0)*df;
    if(campPurch<=0||campRev<=0) return;
    var aov=campRev/campPurch;
    var totSpend=camp.adsets.reduce(function(s,as){return s+(as.spend||0);},0)||1;

    camp.adsets.forEach(function(as,asi){
      var asFrac=totSpend>0?(as.spend||0)/totSpend:1/camp.adsets.length;
      var asPurch=Math.max(0,Math.round(campPurch*asFrac));
      if(asPurch<=0) return;

      as.ads.forEach(function(ad,adIdx){
        var adFrac=1/as.ads.length;
        var adPurch=adIdx<as.ads.length-1
          ?Math.max(0,Math.round(asPurch*adFrac))
          :Math.max(0,asPurch-Math.round(asPurch*adFrac)*(as.ads.length-1));
        for(var i=0;i<adPurch;i++){
          var seed=(p.id.charCodeAt(0)*31+asi*97+adIdx*13+i*7)%1000;
          var tsOff=((seed/1000)+(i/Math.max(1,adPurch)))*winMs*0.95;
          var ts=now-tsOff;
          var dt=new Date(ts);
          var variance=1+((seed%40)-20)/100;
          allOrders.push({
            id:"ORD-"+camp.uc+"-"+adIdx+"-"+i,
            date:dt.toLocaleDateString("en-US",{month:"short",day:"numeric"}),
            ts:ts,
            customer:names[(seed+i)%names.length],
            product:prods[i%prods.length],
            rev:Math.max(1,Math.round(aov*variance)),
            source:"shopify",
            utm_source:"meta",
            utm_medium:"paid_social",
            utm_campaign:camp.uc,
            utm_content:ad.utm||"-",
            utm_term:as.name.split(" ")[0],
            campName:camp.name,
            adsetName:as.name,
            adName:ad.name,
            paid:seed%12!==0,
            matched:seed%8!==0,
            manual:false
          });
        }
      });
    });
  });

  allOrders.sort(function(a,b){return b.ts-a.ts;});
  _ordersCache[key]=allOrders;
  return allOrders.concat(salesState.customOrders||[]);
}

function getRealTotals(p,days){
  var orders=genOrders(p,days);
  var rev=0,purch=0,matched=0;
  orders.forEach(function(o){rev+=o.rev;purch++;if(o.matched)matched++;});
  var t=gTotals(p);
  return{rev:rev,purch:purch,matched:matched,
    cpa:t.spend>0&&purch>0?t.spend/purch:0,
    roas:t.spend>0?rev/t.spend:0};
}


// \u2500\u2500 Plan targets (monthly base) \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500
function getPlanTargets(p) {
  var S  = settingsState;
  var df = Math.min(1, getDays()/30);
  var revGoal  = parseFloat(S.revenueGoal||S.monthlyBudget||0)||0;
  var budGoal  = parseFloat(S.adBudget||S.monthlyBudget||0)||0;
  var roasGoal = parseFloat(S.targetROAS||3)||3;
  var cpaGoal  = parseFloat(S.targetCPA||S.maxCPA||25)||25;
  var purchGoal= parseFloat(S.plannedPurchases||0)||0;
  // Scale plan to selected period
  return {
    revenue:  Math.round(revGoal * df),
    budget:   Math.round(budGoal * df),
    orders:   Math.round(purchGoal * df),
    roas:     roasGoal,
    aov:      purchGoal > 0 ? Math.round(revGoal / purchGoal) : 0,
    cpa:      cpaGoal
  };
}

// 12. SALES & ATTRIBUTION (rSales)
// ════════════════════════════════════════════════════════════════════════════
function rSales(){
  // Plan gate: Sales & Attribution requires salesAttribution flag (Operator+)
  if (typeof hasFeature === 'function' && !hasFeature('salesAttribution')){
    var _el = document.getElementById('s-sales');
    if (_el) _el.innerHTML = renderLockedSectionPanel('salesAttribution', 'Sales & Attribution');
    return;
  }
  var p=gP(),c=p.cur,t=gTotals(p),lng=L(),su=lng.salesUI||{};
  var days=getDays();
  var df=Math.min(1,days/30);
  var allOrders=genOrders(p,days);
  var sources=getSalesSources();
  if(!sources||!sources.length)sources=[{id:"shopify",label:"Shopify",icon:"S",color:"#96bf48",connected:true}];
  var activeSrc=sources.find(function(s){return s.id===salesState.source;})||sources[0];
  var srcOrders=salesState.source==="manual"
    ?salesState.customOrders
    :!activeSrc.connected
    ?[]
    :salesState.source==="shopify"
    ?allOrders
    :allOrders.filter(function(o){return o.source===salesState.source;});

  // \u2500\u2500 All-source totals (not filtered by active source) \u2500\u2500\u2500\u2500\u2500\u2500
  var allRealOrders=genOrders(p,days).concat(salesState.customOrders||[]);
  var totalRev=allRealOrders.reduce(function(a,o){return a+o.rev;},0);
  var totalPurch=allRealOrders.length;
  var aov=totalPurch>0?totalRev/totalPurch:0;
  var realRoas=t.spend>0?totalRev/t.spend:0;
  // srcOrders is still used for the orders table below (source-filtered)
  var plan=getPlanTargets(p);
  var h="";

  // \u2500\u2500 HEADER \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500
  h+=renderSalesDecisionPanel();

  h+='<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;flex-wrap:wrap;gap:10px">';
  h+='<div style="font-size:14px;font-weight:700;color:var(--text)">'+(su.title||"Sales & Attribution")+'</div>';
  h+='<button onclick="openAddOrderModal()" style="display:flex;align-items:center;gap:6px;padding:7px 14px;border-radius:8px;background:var(--accent);border:none;color:#fff;font-size:12px;font-weight:600;cursor:pointer">'+(su.addOrder||"+ Add Order")+'</button>';
  h+='</div>';

  // \u2500\u2500 METRIC CARDS \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500
  var mCards=[
    {l:su.revenueLabel||"Revenue",   act:fc(totalRev,c),             plan:fc(plan.revenue,c),pct:plan.revenue>0?Math.round(totalRev/plan.revenue*100):0},
    {l:su.ordersLabel||"Orders",     act:""+totalPurch,         plan:""+plan.orders,    pct:plan.orders>0?Math.round(srcOrders.length/plan.orders*100):0},
    {l:su.aovLabel||"AOV",           act:fc(aov,c),                  plan:fc(plan.aov,c),    pct:plan.aov>0?Math.round(aov/plan.aov*100):0},
    {l:su.realRoasLabel||"Real ROAS",act:fx(realRoas),               plan:fx(plan.roas),     pct:plan.roas>0?Math.round(realRoas/plan.roas*100):0},
    {l:"Budget",                       act:fc(t.spend,c),              plan:fc(parseFloat(settingsState.monthlyBudget)||0,c),pct:(parseFloat(settingsState.monthlyBudget)||0)>0?Math.round(t.spend/(parseFloat(settingsState.monthlyBudget)||1)*100):0}
  ];
  h+='<div class="metric-grid" style="grid-template-columns:repeat(auto-fill,minmax(150px,1fr));margin-bottom:18px">';
  mCards.forEach(function(m){
    var barColor=m.pct>=100?"var(--green)":m.pct>=70?"var(--yellow)":"var(--red)";
    var barW=Math.min(100,m.pct||0);
    h+='<div class="metric-card">';
    h+='<div class="metric-label">'+m.l+'</div>';
    h+='<div class="metric-value" style="font-size:18px;margin-bottom:4px">'+m.act+'</div>';
    if(m.plan!=="-"){
      h+='<div style="font-size:10px;color:var(--text4);margin-bottom:5px">'+(su.plan||"Plan")+': '+m.plan+'</div>';
      h+='<div style="height:3px;background:var(--hover-bg);border-radius:2px;overflow:hidden"><div style="height:100%;width:'+barW+'%;background:'+barColor+';border-radius:2px"></div></div>';
      h+='<div style="font-size:9px;color:'+barColor+';margin-top:3px;font-weight:600">'+barW+'% '+(su.planOf||"of plan")+'</div>';
    } else {
      h+='<div style="font-size:10px;color:var(--text4)">'+m.pct+'% matched</div>';
    }
    h+='</div>';

// Filter campaigns by selected BM/Account
function aoUpdateCamps(val) {
  var p = gP(), allCamps = gCamps(p);
  var sel = document.getElementById('ao-campsel');
  if (!sel) return;
  var filtered = allCamps;
  if (val && val.indexOf('bm') < 0) {
    var parts = val.split('_');
    var bi = parseInt(parts[0]), ai = parseInt(parts[1]);
    if (!isNaN(bi) && !isNaN(ai)) {
      var bm = p.bms[bi], acc = bm&&bm.accounts[ai];
      if (acc) {
        filtered = (acc.camps||[]).map(function(camp){
          return Object.assign({},camp,{bmn:bm.name,accn:acc.name});
        });
      }
    }
  }
  sel.innerHTML = filtered.map(function(camp,i){
    return '<option value="'+i+'">['+camp.bmn+'] '+camp.name+'</option>';
  }).join('');
  updateAddOrderAdsets(0);
}

function updateAddOrderAdsets(campIdx) {

function updateAddOrderAds(campIdx, asIdx) {

function submitAddOrder() {
  var p = gP(), c = p.cur, camps = gCamps(p);
  var id       = (document.getElementById('ao-id').value||'').trim();
  var date     = document.getElementById('ao-date').value;
  var cust     = (document.getElementById('ao-cust').value||'').trim();
  var prodCustom = (document.getElementById('ao-prod-custom').value||'').trim();
  var prodSelect = document.getElementById('ao-prod-sel').value||'';
  var prod       = prodCustom || prodSelect || 'Product';
  var rev      = parseFloat(document.getElementById('ao-rev').value)||0;
  var src      = document.getElementById('ao-src').value||'manual';
  var med      = document.getElementById('ao-med').value||'manual';
  var campUtm  = document.getElementById('ao-camp').value||'';
  var cont     = document.getElementById('ao-cont').value||'';
  var term     = document.getElementById('ao-term').value||'';
  var campIdx  = parseInt(document.getElementById('ao-campsel').value)||0;
  var asIdx    = parseInt(document.getElementById('ao-assel').value)||0;
  var adIdx    = parseInt(document.getElementById('ao-adsel').value)||0;

  if (!rev||rev<=0) { alert('Please enter a valid revenue amount.'); return; }
  if (!cust)        { alert('Please enter a customer name.'); return; }

  var camp = camps[campIdx]||camps[0];
  var as   = camp&&(camp.adsets[asIdx]||camp.adsets[0]);
  var ad   = as&&(as.ads[adIdx]||as.ads[0]);
  var dt   = date ? new Date(date) : new Date();
  var dStr = dt.toLocaleDateString('en-US',{month:'short',day:'numeric'});

  // Build manual order — first-class revenue object.
  // Three distinct concepts (per V1 architecture):
  //   sourceType        — where the order came from        (shopify | gsheets | manual)
  //   attributionStatus — how this order is attributed     (attributed | unattributed | partial)
  //   reconciliation    — has it been verified vs. backend (pending | matched | unmatched)
  //   orderStatus       — payment / lifecycle state         (paid | pending | refunded)
  var hasAttribution = !!(camp && (campUtm || camp.uc));
  var newOrder = {
    id:                id||('MORD-'+Date.now()),
    date:              dStr,
    ts:                dt.getTime(),
    customer:          cust,
    product:           prod,
    rev:               rev,
    // Source = where the revenue data came from. Always "manual" for orders entered here.
    source:            'manual',
    // Attribution = which campaign produced this sale. Independent from source.
    attributionStatus: hasAttribution ? 'attributed' : 'unattributed',
    // Reconciliation = has this been cross-checked vs. a connected backend (Shopify, GSheets).
    // Manual entries default to "pending" until matched in real product backend.
    reconciliation:    'pending',
    // Payment / lifecycle status.
    orderStatus:       'paid',
    // UTM (traffic) data
    utm_source:        src,
    utm_medium:        med,
    utm_campaign:      campUtm||(camp&&camp.uc)||'',
    utm_content:       cont||(ad&&ad.utm)||'',
    utm_term:          term||(as&&as.name.split(' ')[0])||'',
    // Attribution data
    campName:          camp ? camp.name : '',
    adsetName:         as && as.name || '',
    adName:            ad && ad.name || '',
    bmName:            camp ? (camp.bmn||'') : '',
    accName:           camp ? (camp.accn||'') : '',
    // Legacy compat flags (still used by table rendering)
    paid:              true,
    matched:           hasAttribution,
    manual:            true
  };

  // Add to manual orders list
  salesState.customOrders.unshift(newOrder);

  // Propagate revenue into campaign/adset/ad so Dashboard+Meta reflect it.
  // Only propagate if attribution is set — unattributed orders contribute to TOTAL revenue
  // but NOT to a specific campaign's real ROAS.
  if (hasAttribution && camp){
    camp.rev   = (camp.rev||0) + rev;
    camp.purch = (camp.purch||0) + 1;
    if (as){ as.rev=(as.rev||0)+rev; as.purch=(as.purch||0)+1; }
    if (ad){ ad.rev=(ad.rev||0)+rev; ad.purch=(ad.purch||0)+1; }
  }

  // Close modal, refresh everything (manual orders show up regardless of source filter)
  var m = document.getElementById('add-order-modal');
  if (m) m.remove();
  salesState.showAddModal = false;
  if(salesState.source && !dsState[salesState.source] && salesState.source!=="meta") salesState.source = "shopify";
  salesState.page   = 1;
  rAllSections();
}

function rUTM(){
  // Plan gate: UTM Generator requires utm flag (Operator+)
  if (typeof hasFeature === 'function' && !hasFeature('utm')){
    var _el_u = document.getElementById('s-utm');
    if (_el_u) _el_u.innerHTML = renderLockedSectionPanel('utm', 'UTM Generator');
    return;
  }
  // V1 scope: simple generator only. No saved tags, no status, no pagination, no BM.
  var S=window.utmState;
  var lng=L(), u=lng.utmUI||{};

  function buildUrl(){
    var base=(S.url||"").trim();
    if(!base)return "";
    if(base.indexOf("http")<0)base="https://"+base;
    var ps=[];
    if(S.source)  ps.push("utm_source="+encodeURIComponent(S.source));
    if(S.medium)  ps.push("utm_medium="+encodeURIComponent(S.medium));
    if(S.campaign)ps.push("utm_campaign="+encodeURIComponent(S.campaign));
    if(S.content) ps.push("utm_content="+encodeURIComponent(S.content));
    if(S.term)    ps.push("utm_term="+encodeURIComponent(S.term));
    return base+(ps.length?(base.indexOf("?")>=0?"&":"?")+ps.join("&"):"");
  }

  var finalUrl=buildUrl();
  var h="";

  // Section title
  h+='<div style="font-size:14px;font-weight:700;color:var(--text);margin-bottom:16px">'+(u.title||"")+'</div>';

  // Quick presets
  if(S.presets && S.presets.length){
    h+='<div style="display:flex;flex-wrap:wrap;gap:6px;margin-bottom:14px">';
    S.presets.forEach(function(pr,i){
      h+='<button onclick="utmPreset('+i+')" style="padding:6px 12px;border-radius:7px;border:1px solid var(--border2);background:var(--hover-bg);color:var(--text2);font-size:11px;font-weight:500;cursor:pointer">'+pr.name+'</button>';
    });
    h+='</div>';
  }

  // Form card
  h+='<div class="card" style="padding:20px;margin-bottom:14px">';
  h+='<div style="font-size:12px;font-weight:600;color:var(--text2);margin-bottom:16px">'+(u.buildTitle||"")+'</div>';

  // URL field
  h+='<div style="margin-bottom:14px">';
  h+='<label style="display:block;font-size:11px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.06em;margin-bottom:6px">'+(u.urlLabel||"")+' <span style="color:var(--red)">*</span></label>';
  h+='<input id="utm-url" type="url" placeholder="https://yoursite.com/landing" value="'+S.url+'" oninput="utmUpdate(\'url\',this.value)" style="width:100%;padding:9px 12px;border-radius:8px;background:var(--inp-bg);border:1px solid var(--border2);color:var(--text);font-size:12px;outline:none">';
  h+='</div>';

  // utm_* fields
  h+='<div style="display:grid;grid-template-columns:1fr 1fr;gap:12px">';
  var fields=[
    {id:"source",  label:"utm_source",   ph:u.sourcePh   ||"meta",            val:S.source,   hint:u.sourceHint   ||"",          req:true},
    {id:"medium",  label:"utm_medium",   ph:u.mediumPh   ||"paid_social",     val:S.medium,   hint:u.mediumHint   ||"",       req:true},

function utmUpdate(field,val){
  if(!window.utmState)return;
  if(field==="bmIdx")window.utmState.bmIdx=parseInt(val)||0;
  else window.utmState[field]=val;
  rUTM();
  setTimeout(function(){
    var el=document.getElementById("utm-"+field);
    if(el&&el.tagName==="INPUT"){el.focus();var l=el.value.length;el.setSelectionRange(l,l);}
  },0);
}
function utmPreset(i){

  window.utmState.medium=pr.medium;
  window.utmState.campaign=pr.campaign;
  window.utmState.content=pr.content;

}
function utmReset(){

}
function utmCopy(){
  var el=document.getElementById("utm-output");
  if(!el)return;
  var text=(el.innerText||el.textContent).replace(/\u00a0/g," ");
  if(navigator.clipboard){navigator.clipboard.writeText(text);}
  else{var ta=document.createElement("textarea");ta.value=text;document.body.appendChild(ta);ta.select();document.execCommand("copy");document.body.removeChild(ta);}
  var btn=document.getElementById("utm-copy-btn");
  if(btn){var orig=btn.innerHTML;btn.innerHTML="&#10003; Copied!";btn.style.color="var(--green)";btn.style.borderColor="var(--green-brd)";btn.style.background="var(--green-bg)";setTimeout(function(){btn.innerHTML=orig;btn.style.color="";btn.style.borderColor="";btn.style.background="";},1500);}
}

function confirmDeleteProject(){
  var pid=ST.pid;
  var name=P[pid]?P[pid].name:'Project';
  var keys=Object.keys(P);
  if(keys.length<=1){
    closeDeleteProjectModal();
    var t=document.createElement('div');
    t.style.cssText='position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--red);color:#fff;padding:11px 22px;border-radius:10px;font-size:12px;font-weight:600;z-index:900';
    t.innerHTML='\u26a0 Cannot delete the last project.';
    document.body.appendChild(t);
    setTimeout(function(){t.remove();},3000);
    return;
  }
  // Delete project
  delete P[pid];
  // Switch to another project
  var remaining=Object.keys(P);
  ST.pid=remaining[0];
  _ordersCache={};
  closeDeleteProjectModal();
  buildSB();

  toast.innerHTML='\u2713 Project "'+name+'" deleted.';
  document.body.appendChild(toast);
  setTimeout(function(){toast.remove();},3000);
}
